name: Python AI Autofix (Claude Code)

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: Auto-fixes Python findings on a dedicated _cop branch
# using Claude Code (anthropics/claude-code-action).
#
# Each tool (flake8, bandit, tests) runs as its own Claude session to keep
# context windows small and failures isolated. After each session, changes
# are committed separately. On completion a PR is opened: _cop → feature.
#
# Branch Strategy (_cop):
#   feature branch fails → _cop created → fixes committed → PR opened
#   _cop fails again    → next iteration → more commits → CI re-runs
#   _cop passes         → merge PR (_cop → feature)
#   max iterations hit  → stops (no infinite loop)
#
# Prerequisites:
#   - ANTHROPIC_API_KEY org/repo secret
#   - GH_RELEASE_APP_ID + GH_RELEASE_APP_PRIVATE_KEY secrets
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      python_version:
        description: "Python version"
        default: "3.12"
        required: false
        type: string
      python_source_path:
        description: "Relative path from repo root to the Python package root"
        default: "."
        required: false
        type: string
      copilot_fix_flake8:
        description: "Whether Claude should fix flake8 findings"
        required: false
        default: true
        type: boolean
      copilot_fix_bandit:
        description: "Whether Claude should fix bandit findings"
        required: false
        default: true
        type: boolean
      copilot_fix_tests:
        description: "Whether Claude should fix failing tests"
        required: false
        default: false
        type: boolean
      test_modules:
        description: >
          JSON array of module names whose _test/ folders should be exercised.
          Example: '["logging","storage","xml_parser"]'
        default: "[]"
        required: false
        type: string
      extra_pip_packages:
        description: "Space-separated extra pip packages to install"
        default: ""
        required: false
        type: string
      gh_wf_config_repo:
        description: "Public repo where linting config is stored"
        default: "acai-solutions/github-workflow-configs"
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: "Ref or branch of gh_wf_config_repo"
        default: "main"
        required: false
        type: string
      python_config_path:
        description: "Path to python config in gh_wf_config_repo"
        default: "python"
        required: false
        type: string
      max_copilot_attempts:
        description: "Maximum number of fix iterations on _cop branch"
        required: false
        default: 3
        type: number
      commit_user:
        description: "Username for autofix commits"
        default: "github-actions[bot]"
        required: false
        type: string
      commit_email:
        description: "Email for autofix commits"
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        required: false
        type: string

    secrets:
      GH_RELEASE_APP_ID:
        required: true
      GH_RELEASE_APP_PRIVATE_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false

    outputs:
      fixes_applied:
        description: "Whether fixes were pushed to _cop branch"
        value: ${{ jobs.autofix.outputs.fixes_applied }}
      fix_summary:
        description: "Summary of applied fixes"
        value: ${{ jobs.autofix.outputs.fix_summary }}
      cop_branch:
        description: "Name of the _cop branch"
        value: ${{ jobs.guard.outputs.cop_branch }}
      feature_branch:
        description: "Name of the feature branch"
        value: ${{ jobs.guard.outputs.feature_branch }}
      iteration:
        description: "Current iteration count after this run"
        value: ${{ jobs.guard.outputs.iteration }}
      pr_url:
        description: "URL of the pull request from _cop to feature branch"
        value: ${{ jobs.autofix.outputs.pr_url }}

defaults:
  run:
    shell: bash

jobs:
  # ── Guard: branch context + iteration limit ─────────────────────────────
  guard:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      is_cop_branch: ${{ steps.detect.outputs.is_cop_branch }}
      current_branch: ${{ steps.detect.outputs.current_branch }}
      cop_branch: ${{ steps.detect.outputs.cop_branch }}
      feature_branch: ${{ steps.detect.outputs.feature_branch }}
      iteration: ${{ steps.detect.outputs.iteration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Detect branch context
        id: detect
        run: |
          BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"

          if [[ "${BRANCH}" == *_cop ]]; then
            IS_COP=true
            FEATURE="${BRANCH%_cop}"
            COP="${BRANCH}"
          else
            IS_COP=false
            FEATURE="${BRANCH}"
            COP="${BRANCH}_cop"
          fi

          echo "current_branch=${BRANCH}"   >> "$GITHUB_OUTPUT"
          echo "is_cop_branch=${IS_COP}"    >> "$GITHUB_OUTPUT"
          echo "feature_branch=${FEATURE}"  >> "$GITHUB_OUTPUT"
          echo "cop_branch=${COP}"          >> "$GITHUB_OUTPUT"

          # Count previous autofix iterations
          ITERATION=0
          if [[ "${IS_COP}" == "true" ]]; then
            git fetch origin "${FEATURE}" 2>/dev/null || true
            DIVERGE=$(git merge-base HEAD "origin/${FEATURE}" 2>/dev/null || echo "")
            if [[ -n "${DIVERGE}" ]]; then
              ITERATION=$(git log --oneline "${DIVERGE}..HEAD" \
                --grep="copilot-autofix: true" | wc -l | tr -d ' ')
            fi
          fi
          echo "iteration=${ITERATION}" >> "$GITHUB_OUTPUT"

          MAX=${{ inputs.max_copilot_attempts }}
          if [[ "${ITERATION}" -ge "${MAX}" ]]; then
            echo "🛑 Max iterations (${MAX}) reached — stopping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

          echo "📌 Branch: ${BRANCH} | Feature: ${FEATURE} | Cop: ${COP}"
          echo "📌 Is _cop: ${IS_COP} | Iteration: ${ITERATION}/${MAX}"

  # ── Main autofix job ────────────────────────────────────────────────────
  autofix:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner_type }}
    permissions:
      pull-requests: write
    outputs:
      fixes_applied: ${{ steps.set_outputs.outputs.fixes_applied }}
      fix_summary: ${{ steps.set_outputs.outputs.fix_summary }}
      pr_url: ${{ steps.create_pr.outputs.pr_url }}

    steps:
      # ── Auth + Checkout ─────────────────────────────────────────────────
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.guard.outputs.current_branch }}
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      # ── Branch setup ────────────────────────────────────────────────────
      - name: Setup _cop branch
        run: |
          git config --local user.name  "${{ inputs.commit_user }}"
          git config --local user.email "${{ inputs.commit_email }}"

          if [[ "${{ needs.guard.outputs.is_cop_branch }}" == "true" ]]; then
            echo "🔄 Already on _cop branch"
          else
            COP="${{ needs.guard.outputs.cop_branch }}"
            git fetch origin
            if git ls-remote --exit-code --heads origin "${COP}" >/dev/null 2>&1; then
              git checkout -b "${COP}" "origin/${COP}"
              echo "🔄 Checked out existing _cop branch"
            else
              git checkout -b "${COP}"
              echo "🆕 Created _cop branch: ${COP}"
            fi
          fi
          echo "✅ Branch: $(git branch --show-current)"

      # ── Python environment ──────────────────────────────────────────────
      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install tools and project
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

          if [[ -n "${{ inputs.extra_pip_packages }}" ]]; then
            pip install ${{ inputs.extra_pip_packages }}
          fi

          if [[ -f "${{ inputs.python_source_path }}/pyproject.toml" ]]; then
            pip install -e "${{ inputs.python_source_path }}"
          fi

          if [[ "${{ inputs.copilot_fix_tests }}" == "true" ]]; then
            pip install pytest pytest-cov
          fi

      # ══════════════════════════════════════════════════════════════════════
      # FLAKE8
      # ══════════════════════════════════════════════════════════════════════

      - name: Fetch flake8 config
        if: inputs.copilot_fix_flake8
        run: |
          SRC="${{ inputs.python_source_path }}"

          if [[ -f ".flake8" ]]; then
            echo "✅ Using local .flake8"
          else
            RESP=$(curl -s -w "\n%{http_code}" -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ inputs.gh_wf_config_repo }}/contents/${{ inputs.python_config_path }}/.flake8?ref=${{ inputs.gh_wf_config_repo_ref }}")
            CODE=$(echo "$RESP" | tail -n 1)
            BODY=$(echo "$RESP" | head -n -1)
            if [[ "$CODE" == "200" ]]; then
              echo "$BODY" > .flake8
              echo "✅ Downloaded .flake8"
            else
              echo "⚠️ No .flake8 available (HTTP $CODE)"
            fi
          fi

          if [[ -f ".flake8" && "${SRC}" != "." ]]; then
            cp .flake8 "${SRC}/.flake8"
          fi

      - name: Run flake8
        if: inputs.copilot_fix_flake8
        id: run_flake8
        run: |
          cd "${{ inputs.python_source_path }}"
          flake8 . --format=default > /tmp/flake8-findings.txt 2>&1 || true

          if [[ -s /tmp/flake8-findings.txt ]]; then
            COUNT=$(wc -l < /tmp/flake8-findings.txt | tr -d ' ')
            echo "⚠️ ${COUNT} flake8 findings"
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No flake8 findings"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix flake8 findings"
        id: claude_flake8
        if: inputs.copilot_fix_flake8 && steps.run_flake8.outputs.has_findings == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix all flake8 findings in /tmp/flake8-findings.txt.

            Working directory: ${{ inputs.python_source_path }}

            Steps:
            1. Read /tmp/flake8-findings.txt to see every finding.
            2. For each finding, edit the source file to fix the issue.
            3. Re-run: cd ${{ inputs.python_source_path }} && flake8 . --format=default
            4. Iterate until flake8 is clean.

            Common fixes:
            - F401 unused import → remove the import line
            - F841 unused variable → remove the assignment or use the variable
            - E731 lambda assignment → replace with a def statement
            - E741 ambiguous name → rename to a descriptive name
            - C901 too complex → extract helper functions

            Rules:
            - Only edit files under ${{ inputs.python_source_path }}/
            - Do NOT modify .flake8, pyproject.toml, or any config file.
            - Do NOT add comments explaining your changes.
            - Do NOT commit anything — just edit files.
            - Preserve existing docstrings and formatting style.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-haiku-4-5-20251001
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: Clean up copied .flake8
        if: inputs.copilot_fix_flake8
        run: |
          SRC="${{ inputs.python_source_path }}"
          if [[ "${SRC}" != "." && -f "${SRC}/.flake8" ]]; then
            if ! git show HEAD:"${SRC}/.flake8" &>/dev/null 2>&1; then
              rm -f "${SRC}/.flake8"
              echo "🧹 Removed copied .flake8"
            fi
          fi

      - name: Commit flake8 fixes
        id: commit_flake8
        if: inputs.copilot_fix_flake8
        run: |
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))

          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No flake8 changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          git add -A
          git commit -m "fix(flake8): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed flake8 fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # BANDIT
      # ══════════════════════════════════════════════════════════════════════

      - name: Run bandit
        if: inputs.copilot_fix_bandit
        id: run_bandit
        run: |
          cd "${{ inputs.python_source_path }}"
          bandit -r . -f txt > /tmp/bandit-findings.txt 2>&1 || true

          if grep -q "Issue:" /tmp/bandit-findings.txt; then
            COUNT=$(grep -c "Issue:" /tmp/bandit-findings.txt || echo "0")
            echo "⚠️ ${COUNT} bandit findings"
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No bandit findings"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix bandit findings"
        id: claude_bandit
        if: inputs.copilot_fix_bandit && steps.run_bandit.outputs.has_findings == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix all security findings in /tmp/bandit-findings.txt.

            Working directory: ${{ inputs.python_source_path }}

            Steps:
            1. Read /tmp/bandit-findings.txt to see every finding.
            2. Fix each issue without changing observable behavior.
            3. For hardcoded secrets: replace with os.environ lookups or config files.
            4. For unsafe functions: replace with safe alternatives.
            5. If a finding is a confirmed false positive (e.g. test fixtures): add # nosec BXXX with the exact code.
            6. Re-run: cd ${{ inputs.python_source_path }} && bandit -r . -f txt
            7. Iterate until no fixable findings remain.

            Rules:
            - Only edit files under ${{ inputs.python_source_path }}/
            - Do NOT modify pyproject.toml or any config file.
            - Do NOT add explanatory comments (# nosec comments are allowed).
            - Do NOT commit anything — just edit files.
            - Preserve existing code structure and docstrings.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-haiku-4-5-20251001
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: Commit bandit fixes
        id: commit_bandit
        if: inputs.copilot_fix_bandit
        run: |
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))

          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No bandit changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          git add -A
          git commit -m "fix(bandit): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed bandit fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # TESTS
      # ══════════════════════════════════════════════════════════════════════

      - name: Run pytest
        if: inputs.copilot_fix_tests
        id: run_pytest
        run: |
          SRC="${{ inputs.python_source_path }}"
          TEST_MODULES='${{ inputs.test_modules }}'
          PYTEST_PATHS=""

          if [[ "${TEST_MODULES}" != "[]" ]]; then
            PKG=$(cd "${SRC}" && python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml','rb') as f:
              cfg = tomllib.load(f)
          print(cfg['project']['name'])
          " 2>/dev/null || echo "")

            if [[ -n "${PKG}" ]]; then
              for MOD in $(echo "${TEST_MODULES}" | python3 -c "import json,sys; [print(m) for m in json.load(sys.stdin)]"); do
                PYTEST_PATHS="${PYTEST_PATHS} ${PKG}/${MOD}/_test/"
              done
            fi
          fi

          cd "${SRC}"
          if [[ -n "${PYTEST_PATHS}" ]]; then
            python -m pytest ${PYTEST_PATHS} -v --tb=long > /tmp/pytest-failures.txt 2>&1 || true
          else
            python -m pytest . -v --tb=long > /tmp/pytest-failures.txt 2>&1 || true
          fi

          if grep -qE "^FAILED" /tmp/pytest-failures.txt; then
            COUNT=$(grep -cE "^FAILED" /tmp/pytest-failures.txt || echo "0")
            echo "⚠️ ${COUNT} test failures"
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ All tests pass"
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix test failures"
        id: claude_tests
        if: inputs.copilot_fix_tests && steps.run_pytest.outputs.has_failures == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix the failing tests listed in /tmp/pytest-failures.txt.

            Working directory: ${{ inputs.python_source_path }}

            Steps:
            1. Read /tmp/pytest-failures.txt to identify every failure.
            2. Fix the SOURCE CODE to make the failing tests pass.
            3. If a test file has obvious bugs (wrong imports, typos), fix those too.
            4. Re-run the specific failing tests to verify they pass.
            5. Iterate until all previously failing tests pass.

            Rules:
            - Only edit files under ${{ inputs.python_source_path }}/
            - Do NOT weaken, remove, or skip test assertions.
            - Do NOT add comments explaining your changes.
            - Do NOT commit anything — just edit files.
            - Preserve existing code structure and docstrings.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-sonnet-4-6
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: Commit test fixes
        id: commit_tests
        if: inputs.copilot_fix_tests
        run: |
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))

          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No test changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          git add -A
          git commit -m "fix(tests): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed test fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # PUSH + PR
      # ══════════════════════════════════════════════════════════════════════

      - name: Aggregate outputs
        id: set_outputs
        run: |
          F="${{ steps.commit_flake8.outputs.committed }}"
          B="${{ steps.commit_bandit.outputs.committed }}"
          T="${{ steps.commit_tests.outputs.committed }}"

          if [[ "${F}" == "true" || "${B}" == "true" || "${T}" == "true" ]]; then
            echo "fixes_applied=true" >> "$GITHUB_OUTPUT"
            PARTS=()
            [[ "${F}" == "true" ]] && PARTS+=("flake8")
            [[ "${B}" == "true" ]] && PARTS+=("bandit")
            [[ "${T}" == "true" ]] && PARTS+=("tests")
            printf -v SUMMARY '%s,' "${PARTS[@]}"
            echo "fix_summary=claude-code:${SUMMARY%,}" >> "$GITHUB_OUTPUT"
          else
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
            echo "fix_summary=No fixes needed" >> "$GITHUB_OUTPUT"
          fi

      - name: Push _cop branch
        if: steps.set_outputs.outputs.fixes_applied == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          COP="${{ needs.guard.outputs.cop_branch }}"
          git remote set-url origin \
            "https://x-access-token:${GH_APP_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${COP}"
          echo "✅ Pushed ${COP}"

      - name: Create or update PR
        id: create_pr
        if: steps.set_outputs.outputs.fixes_applied == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COP="${{ needs.guard.outputs.cop_branch }}"
          FEATURE="${{ needs.guard.outputs.feature_branch }}"
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))

          EXISTING=$(gh pr list --head "${COP}" --base "${FEATURE}" \
            --json url -q '.[0].url' 2>/dev/null || echo "")

          if [[ -n "${EXISTING}" ]]; then
            echo "📎 PR already exists: ${EXISTING}"
            echo "pr_url=${EXISTING}" >> "$GITHUB_OUTPUT"
          else
            # Build status lines
            FLAKE8_LINE="| Flake8 | $([[ '${{ steps.commit_flake8.outputs.committed }}' == 'true' ]] && echo '✅ Fixed' || echo '${{ inputs.copilot_fix_flake8 }}' | grep -q true && echo '⏭️ No issues' || echo '—') |"
            BANDIT_LINE="| Bandit | $([[ '${{ steps.commit_bandit.outputs.committed }}' == 'true' ]] && echo '✅ Fixed' || echo '${{ inputs.copilot_fix_bandit }}' | grep -q true && echo '⏭️ No issues' || echo '—') |"
            TESTS_LINE="| Tests  | $([[ '${{ steps.commit_tests.outputs.committed }}' == 'true' ]] && echo '✅ Fixed' || echo '${{ inputs.copilot_fix_tests }}' | grep -q true && echo '⏭️ No failures' || echo '—') |"

            PR_URL=$(gh pr create \
              --head "${COP}" \
              --base "${FEATURE}" \
              --title "fix: Python autofix for \`${FEATURE}\` (iteration ${NEXT})" \
              --body "## 🤖 Python AI Autofix (Claude Code)

          Automated fixes applied by Claude Code on \`${COP}\` → \`${FEATURE}\`.

          | | |
          |---|---|
          | _cop branch | \`${COP}\` |
          | Iteration | ${NEXT} / ${{ inputs.max_copilot_attempts }} |
          ${FLAKE8_LINE}
          ${BANDIT_LINE}
          ${TESTS_LINE}

          > Review and merge when CI passes on this branch.")

            echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
            echo "✅ Created PR: ${PR_URL}"
          fi

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo '# 🤖 Python AI Autofix (Claude Code)' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| _cop branch | \`${{ needs.guard.outputs.cop_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Feature branch | \`${{ needs.guard.outputs.feature_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Iteration | ${{ needs.guard.outputs.iteration }} / ${{ inputs.max_copilot_attempts }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flake8 | ${{ inputs.copilot_fix_flake8 && '✅' || '⏭️' }} — committed: ${{ steps.commit_flake8.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | ${{ inputs.copilot_fix_bandit && '✅' || '⏭️' }} — committed: ${{ steps.commit_bandit.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests  | ${{ inputs.copilot_fix_tests && '✅' || '⏭️' }} — committed: ${{ steps.commit_tests.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fixes applied | ${{ steps.set_outputs.outputs.fixes_applied || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PR | ${{ steps.create_pr.outputs.pr_url || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
