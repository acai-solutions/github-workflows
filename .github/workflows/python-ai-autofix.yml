name: Python AI Autofix (Claude Code)

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: Auto-fixes Python findings on a dedicated _cop branch
# using Claude Code (anthropics/claude-code-action).
#
# Claude Code runs as a full agent with shell access — it reads files,
# runs flake8/bandit/pytest, makes surgical edits, and verifies fixes
# iteratively before handing back control.
#
# Branch Strategy (_cop):
#   feature branch fails → _cop created → fixes committed → push triggers CI
#   _cop fails again    → next iteration → fixes committed → push triggers CI
#   _cop passes         → caller creates PR (_cop → feature)
#   max iterations hit  → stops (no infinite loop)
#
# Prerequisites:
#   - ANTHROPIC_API_KEY org/repo secret
#   - Claude GitHub App installed (github.com/apps/claude)
#   - GH_RELEASE_APP_ID + GH_RELEASE_APP_PRIVATE_KEY secrets
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      python_version:
        description: "Python version"
        default: "3.12"
        required: false
        type: string
      python_source_path:
        description: "Relative path from repo root to the Python package root"
        default: "."
        required: false
        type: string
      copilot_fix_flake8:
        description: "Whether Claude should fix flake8 findings"
        required: false
        default: true
        type: boolean
      copilot_fix_bandit:
        description: "Whether Claude should fix bandit findings"
        required: false
        default: true
        type: boolean
      copilot_fix_tests:
        description: "Whether Claude should fix failing tests"
        required: false
        default: false
        type: boolean
      test_modules:
        description: >
          JSON array of module names whose _test/ folders should be exercised.
          Example: '["logging","storage","xml_parser"]'
        default: "[]"
        required: false
        type: string
      extra_pip_packages:
        description: "Space-separated extra pip packages to install"
        default: ""
        required: false
        type: string
      gh_wf_config_repo:
        description: "Public repo where linting config is stored"
        default: "acai-solutions/github-workflow-configs"
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: "Ref or branch of gh_wf_config_repo"
        default: "main"
        required: false
        type: string
      python_config_path:
        description: "Path to python config in gh_wf_config_repo"
        default: "python"
        required: false
        type: string
      max_copilot_attempts:
        description: "Maximum number of fix iterations on _cop branch"
        required: false
        default: 3
        type: number
      commit_user:
        description: "Username for autofix commits"
        default: "github-actions[bot]"
        required: false
        type: string
      commit_email:
        description: "Email for autofix commits"
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        required: false
        type: string

    secrets:
      GH_RELEASE_APP_ID:
        required: true
      GH_RELEASE_APP_PRIVATE_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false

    outputs:
      fixes_applied:
        description: "Whether fixes were pushed to _cop branch"
        value: ${{ jobs.autofix.outputs.fixes_applied }}
      fix_summary:
        description: "Summary of applied fixes"
        value: ${{ jobs.autofix.outputs.fix_summary }}
      cop_branch:
        description: "Name of the _cop branch"
        value: ${{ jobs.guard.outputs.cop_branch }}
      feature_branch:
        description: "Name of the feature branch"
        value: ${{ jobs.guard.outputs.feature_branch }}
      iteration:
        description: "Current iteration count after this run"
        value: ${{ jobs.guard.outputs.iteration }}

defaults:
  run:
    shell: bash

jobs:
  # ── Guard: branch context + iteration limit ─────────────────────────────
  guard:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      is_cop_branch: ${{ steps.detect.outputs.is_cop_branch }}
      current_branch: ${{ steps.detect.outputs.current_branch }}
      cop_branch: ${{ steps.detect.outputs.cop_branch }}
      feature_branch: ${{ steps.detect.outputs.feature_branch }}
      iteration: ${{ steps.detect.outputs.iteration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Detect branch context
        id: detect
        run: |
          BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"

          if [[ "${BRANCH}" == *_cop ]]; then
            IS_COP=true
            FEATURE="${BRANCH%_cop}"
            COP="${BRANCH}"
          else
            IS_COP=false
            FEATURE="${BRANCH}"
            COP="${BRANCH}_cop"
          fi

          echo "current_branch=${BRANCH}"   >> "$GITHUB_OUTPUT"
          echo "is_cop_branch=${IS_COP}"    >> "$GITHUB_OUTPUT"
          echo "feature_branch=${FEATURE}"  >> "$GITHUB_OUTPUT"
          echo "cop_branch=${COP}"          >> "$GITHUB_OUTPUT"

          # Count previous autofix iterations
          ITERATION=0
          if [[ "${IS_COP}" == "true" ]]; then
            git fetch origin "${FEATURE}" 2>/dev/null || true
            DIVERGE=$(git merge-base HEAD "origin/${FEATURE}" 2>/dev/null || echo "")
            if [[ -n "${DIVERGE}" ]]; then
              ITERATION=$(git log --oneline "${DIVERGE}..HEAD" \
                --grep="copilot-autofix: true" | wc -l | tr -d ' ')
            fi
          fi
          echo "iteration=${ITERATION}" >> "$GITHUB_OUTPUT"

          MAX=${{ inputs.max_copilot_attempts }}
          if [[ "${ITERATION}" -ge "${MAX}" ]]; then
            echo "🛑 Max iterations (${MAX}) reached — stopping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

          echo "📌 Branch: ${BRANCH} | Feature: ${FEATURE} | Cop: ${COP}"
          echo "📌 Is _cop: ${IS_COP} | Iteration: ${ITERATION}/${MAX}"

  # ── Main autofix job ────────────────────────────────────────────────────
  autofix:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner_type }}
    outputs:
      fixes_applied: ${{ steps.commit.outputs.fixes_applied }}
      fix_summary: ${{ steps.commit.outputs.fix_summary }}

    steps:
      # ── Auth + Checkout ─────────────────────────────────────────────────
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.guard.outputs.current_branch }}
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      # ── Branch setup ────────────────────────────────────────────────────
      - name: Setup _cop branch
        run: |
          git config --local user.name  "${{ inputs.commit_user }}"
          git config --local user.email "${{ inputs.commit_email }}"

          if [[ "${{ needs.guard.outputs.is_cop_branch }}" == "true" ]]; then
            echo "🔄 Already on _cop branch"
          else
            COP="${{ needs.guard.outputs.cop_branch }}"
            git fetch origin
            if git ls-remote --exit-code --heads origin "${COP}" >/dev/null 2>&1; then
              git checkout -b "${COP}" "origin/${COP}"
              echo "🔄 Checked out existing _cop branch"
            else
              git checkout -b "${COP}"
              echo "🆕 Created _cop branch: ${COP}"
            fi
          fi
          echo "✅ Branch: $(git branch --show-current)"

      # ── Python environment ──────────────────────────────────────────────
      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install tools and project
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

          if [[ -n "${{ inputs.extra_pip_packages }}" ]]; then
            pip install ${{ inputs.extra_pip_packages }}
          fi

          if [[ -f "${{ inputs.python_source_path }}/pyproject.toml" ]]; then
            pip install -e "${{ inputs.python_source_path }}"
          fi

          if [[ "${{ inputs.copilot_fix_tests }}" == "true" ]]; then
            pip install pytest pytest-cov
          fi

      - name: Fetch flake8 config
        if: inputs.copilot_fix_flake8
        run: |
          SOURCE="${{ inputs.python_source_path }}"

          if [[ -f ".flake8" ]]; then
            echo "✅ Using local .flake8"
          else
            RESP=$(curl -s -w "\n%{http_code}" -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ inputs.gh_wf_config_repo }}/contents/${{ inputs.python_config_path }}/.flake8?ref=${{ inputs.gh_wf_config_repo_ref }}")
            CODE=$(echo "$RESP" | tail -n 1)
            BODY=$(echo "$RESP" | head -n -1)
            if [[ "$CODE" == "200" ]]; then
              echo "$BODY" > .flake8
              echo "✅ Downloaded .flake8"
            else
              echo "⚠️ No .flake8 available (HTTP $CODE)"
            fi
          fi

          # Copy to source path if separate from repo root
          if [[ -f ".flake8" && "${SOURCE}" != "." ]]; then
            cp .flake8 "${SOURCE}/.flake8"
          fi

      # ── Build prompt ────────────────────────────────────────────────────
      - name: Build Claude Code prompt
        id: prompt
        run: |
          SRC="${{ inputs.python_source_path }}"
          cat > /tmp/claude-fix-prompt.txt << 'PROMPT_HEADER'
          You are fixing Python code quality and security issues.
          PROMPT_HEADER

          echo "" >> /tmp/claude-fix-prompt.txt
          echo "Working directory: ${SRC}" >> /tmp/claude-fix-prompt.txt
          echo "" >> /tmp/claude-fix-prompt.txt

          HAS_WORK=false

          # ── Flake8 section ──
          if [[ "${{ inputs.copilot_fix_flake8 }}" == "true" ]]; then
            cat >> /tmp/claude-fix-prompt.txt << FLAKE8_EOF
          ## Flake8 Linting Fixes
          1. cd ${SRC} && run: flake8 . --format=default
          2. For each finding, edit the source file to fix the issue.
          3. After fixing, re-run flake8 to verify no new issues were introduced.
          4. Common fixes: remove unused imports (F401), remove unused variables (F841),
             replace lambda assignments with def (E731), rename ambiguous variables (E741),
             reduce function complexity by extracting helper functions (C901).

          FLAKE8_EOF
            HAS_WORK=true
          fi

          # ── Bandit section ──
          if [[ "${{ inputs.copilot_fix_bandit }}" == "true" ]]; then
            cat >> /tmp/claude-fix-prompt.txt << BANDIT_EOF
          ## Bandit Security Fixes
          1. cd ${SRC} && run: bandit -r . -f txt
          2. Fix security findings where possible without changing behavior.
          3. For hardcoded passwords/keys: use environment variables or config files.
          4. For unsafe functions: replace with safe alternatives.
          5. If a finding is a false positive (e.g. test fixtures), add # nosec BXXX.
          6. After fixing, re-run bandit to verify findings are resolved.

          BANDIT_EOF
            HAS_WORK=true
          fi

          # ── Test section ──
          if [[ "${{ inputs.copilot_fix_tests }}" == "true" ]]; then
            echo "## Test Failure Fixes" >> /tmp/claude-fix-prompt.txt
            echo "1. cd ${SRC} && run pytest to identify failures." >> /tmp/claude-fix-prompt.txt

            TEST_MODULES='${{ inputs.test_modules }}'
            if [[ "${TEST_MODULES}" != "[]" ]]; then
              PKG=$(cd "${SRC}" && python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml','rb') as f:
              cfg = tomllib.load(f)
          print(cfg['project']['name'])
          " 2>/dev/null || echo "")

              if [[ -n "${PKG}" ]]; then
                echo "   Run tests per module:" >> /tmp/claude-fix-prompt.txt
                for MOD in $(echo "${TEST_MODULES}" | python3 -c "import json,sys; [print(m) for m in json.load(sys.stdin)]"); do
                  echo "   - pytest ${PKG}/${MOD}/_test/ -v --tb=long" >> /tmp/claude-fix-prompt.txt
                done
              fi
            fi

            cat >> /tmp/claude-fix-prompt.txt << 'TESTS_EOF'
          2. Fix the SOURCE CODE to make failing tests pass.
          3. If a test file has obvious bugs (wrong imports, typos), fix those too.
          4. Do NOT weaken, remove, or skip test assertions.
          5. After fixing, re-run the failing tests to verify they pass.

          TESTS_EOF
            HAS_WORK=true
          fi

          # ── Rules ──
          cat >> /tmp/claude-fix-prompt.txt << RULES_EOF
          ## Important Rules
          - Only edit files under ${SRC}/
          - Do NOT add comments explaining your changes.
          - Do NOT modify .flake8, pyproject.toml, or configuration files.
          - Do NOT commit anything — just edit the files.
          - Preserve existing code structure, docstrings, and formatting style.
          RULES_EOF

          echo "has_work=${HAS_WORK}" >> "$GITHUB_OUTPUT"

          echo "📋 Prompt:"
          cat /tmp/claude-fix-prompt.txt

      # ── Claude Code agent ───────────────────────────────────────────────
      - name: "🤖 Claude Code: Fix Python findings"
        id: claude_fix
        if: steps.prompt.outputs.has_work == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          prompt_file: "/tmp/claude-fix-prompt.txt"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >
            --max-turns 30
            --model claude-sonnet-4-20250514
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(flake8:*),Bash(bandit:*),Bash(pytest:*),Bash(python:*),Bash(pip:*),Bash(cd:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(find:*),Bash(ls:*)"
          track_progress: false

      # ── Clean up, commit, push ──────────────────────────────────────────
      - name: Clean up temporary config
        run: |
          SRC="${{ inputs.python_source_path }}"
          if [[ "${SRC}" != "." && -f "${SRC}/.flake8" ]]; then
            if ! git show HEAD:"${SRC}/.flake8" &>/dev/null 2>&1; then
              rm -f "${SRC}/.flake8"
              echo "🧹 Removed copied .flake8"
            fi
          fi

      - name: Commit fixes
        id: commit
        run: |
          COP="${{ needs.guard.outputs.cop_branch }}"
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))

          if [[ -z "$(git status -s)" ]]; then
            echo "✅ No changes (iteration ${NEXT})"
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
            echo "fix_summary=No fixes needed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT=$(git diff --name-only | wc -l | tr -d ' ')

          git add -A
          git commit -m "fix: Claude Code Python auto-fix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"

          echo "fixes_applied=true" >> "$GITHUB_OUTPUT"
          echo "fix_summary=claude-code-${COUNT}-files" >> "$GITHUB_OUTPUT"
          echo "📝 ${COP} iteration ${NEXT}: ${COUNT} files changed"

      - name: Push _cop branch
        if: steps.commit.outputs.fixes_applied == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          COP="${{ needs.guard.outputs.cop_branch }}"
          git remote set-url origin \
            "https://x-access-token:${GH_APP_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${COP}"
          echo "✅ Pushed ${COP} — CI re-triggers"

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo '# 🤖 Python AI Autofix (Claude Code)' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| _cop branch | \`${{ needs.guard.outputs.cop_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Feature branch | \`${{ needs.guard.outputs.feature_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Iteration | ${{ needs.guard.outputs.iteration }} / ${{ inputs.max_copilot_attempts }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flake8 | ${{ inputs.copilot_fix_flake8 && '✅' || '⏭️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | ${{ inputs.copilot_fix_bandit && '✅' || '⏭️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ inputs.copilot_fix_tests && '✅' || '⏭️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ steps.commit.outputs.fixes_applied == 'true' && '🔄 Fixes pushed' || '✅ No changes' }} |" >> $GITHUB_STEP_SUMMARY
