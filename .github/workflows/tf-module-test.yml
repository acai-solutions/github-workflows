name: Terraform Module Test CI/CD Pipeline

on:
  workflow_call:
    inputs:
      concurrency_group:
        description: "Name of concurrency group to manage concurrent github action runs"
        default: ${{ github.repository }}/${{ github.event.pull_request.head.ref || github.ref }}
        required: false
        type: string
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      tf_version:
        description: "Terraform version used for Terratest"
        default: "latest"
        required: false
        type: string
      tf_registry_hostname:
        description: "Hostname for terraform registry used to download providers"
        default: "registry.terraform.io"
        required: false
        type: string
      tf_terratest_config_repo:
        description: "Public repo where terratest matrix json is stored"
        default: "acai-solutions/github-workflow-configs"
        required: false
        type: string
      tf_terratest_config_repo_ref:
        description: "Ref or branch of terratest_config_repo"
        default: "main"
        required: false
        type: string
      tf_terratest_path:
        description: "Path to terratest directory"
        default: "test/terratest"
        required: false
        type: string
      tf_terratest_examples_path:
        description: "Path to terratest examples directory"
        default: "examples"
        required: false
        type: string
      tf_terratest_max_parallel:
        description: "Maximum number of terratest runs that should run simultaneously"
        default: 1
        required: false
        type: number
      tf_test_beds:
        description: "List of test beds to run tests against (JSON array of cloud provider prefixes, e.g. [\"AWS\"])"
        default: '["AWS"]'
        required: false
        type: string
      tf_test_bed_aws_terratest_config:
        description: 'Path to AWS terratest matrix json config in terratest_config_repo/terraform/terratest/ (e.g. "aws/matrix.json")'
        default: "aws/matrix_tf1x5x7_aws5x80x0.json"
        required: false
        type: string
      tf_test_bed_aws_esc_terratest_config:
        description: 'Path to AWS-ESC terratest matrix json config in terratest_config_repo/terraform/terratest/ (e.g. "aws-esc/matrix.json")'
        default: "aws/matrix_tf1x14x0_aws6x29x0.json"
        required: false
        type: string
    secrets:
      GH_REPO_READ_APP_ID:
        required: true
      GH_REPO_READ_APP_PRIVATE_KEY:
        required: true
      AWS_TESTBED_OIDC_ROLE_ARN:
        required: true
      # Optional AWS-ESC Testbed
      AWS_ESC_TESTBED_OIDC_ROLE_ARN:
        required: false
    outputs: 
      all_checks_passed: 
        description: "all_steps_passed"
        value: ${{ jobs.terratest_run.outputs.terratest_status == 'success' }}

concurrency:
  group: ${{ inputs.concurrency_group }}
  cancel-in-progress: false

jobs:
  terratest_config:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}

    steps:
      # Obtain GitHub App installation token for repo access
      - name: Get GitHub App Token
        if: ${{ inputs.tf_test_beds != '[]' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_REPO_READ_APP_ID }}
          private-key: ${{ secrets.GH_REPO_READ_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        if: ${{ inputs.tf_test_beds != '[]' }}
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.tf_terratest_config_repo }}
          ref: ${{ inputs.tf_terratest_config_repo_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Get Terratest Matrix Config
        if: ${{ inputs.tf_test_beds != '[]' }}
        id: set_matrix
        run: |
          # Build combined matrix from all configured test beds
          COMBINED='{"include":[]}'
          TEST_BEDS='${{ inputs.tf_test_beds }}'
          
          # Process AWS test bed config if "AWS" is in test_beds
          if echo "$TEST_BEDS" | jq -e 'index("AWS")' > /dev/null 2>&1; then
            if [ -n "${{ inputs.tf_test_bed_aws_terratest_config }}" ]; then
              AWS_JSON=$(cat terraform/terratest/${{ inputs.tf_test_bed_aws_terratest_config }} | jq -c .)
              AWS_MATRIX=$(echo "$AWS_JSON" | jq -c 'if has("include") then .include else [.] end | [.[] + {test_bed: "AWS"}]')
              COMBINED=$(echo "$COMBINED" | jq -c --argjson items "$AWS_MATRIX" '.include += $items')
            fi
          fi
          
          # Process AWS-ESC test bed config if "AWS_ESC" is in test_beds
          if echo "$TEST_BEDS" | jq -e 'index("AWS_ESC")' > /dev/null 2>&1; then
            if [ -n "${{ inputs.tf_test_bed_aws_esc_terratest_config }}" ]; then
              AWS_ESC_JSON=$(cat terraform/terratest/${{ inputs.tf_test_bed_aws_esc_terratest_config }} | jq -c .)
              AWS_ESC_MATRIX=$(echo "$AWS_ESC_JSON" | jq -c 'if has("include") then .include else [.] end | [.[] + {test_bed: "AWS_ESC"}]')
              COMBINED=$(echo "$COMBINED" | jq -c --argjson items "$AWS_ESC_MATRIX" '.include += $items')
            fi
          fi
          
          echo "matrix=$COMBINED" >> $GITHUB_OUTPUT

  terratest_run:
    needs:
      - terratest_config
    runs-on: ${{ inputs.runner_type }}
    outputs:
      terratest_status: ${{ steps.terratest_summary.outcome }}

    permissions:
      id-token: write
      contents: read

    strategy:
      max-parallel: ${{ inputs.tf_terratest_max_parallel }}
      matrix: ${{ fromJson(needs.terratest_config.outputs.matrix) }}

    steps:
      # should replace Set Git Access Token step
      - name: Get GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_REPO_READ_APP_ID }}
          private-key: ${{ secrets.GH_REPO_READ_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Configure git to use the GitHub App token for any github.com fetches (modules, submodules, etc.)
      - name: Configure Git to use App Token
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf https://github.com/

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Resolve STS Endpoint
        id: endpoint_domain
        env:
          AWS_REGION: ${{ matrix.test_bed == 'AWS_ESC' && vars.AWS_ESC_TESTBED_AWS_REGION || vars.AWS_TESTBED_AWS_REGION }}
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "❌ No AWS region configured for test bed ${{ matrix.test_bed }}" >&2
            echo "   Expected repository variable: ${{ matrix.test_bed }}_TESTBED_AWS_REGION" >&2
            exit 1
          fi
          echo "aws_region=$AWS_REGION" >> $GITHUB_OUTPUT
          if [[ "$AWS_REGION" == us-gov-* ]]; then
            echo "sts_endpoint=https://sts.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT
          elif [[ "$AWS_REGION" == cn-* ]]; then
            echo "sts_endpoint=https://sts.${AWS_REGION}.amazonaws.com.cn" >> $GITHUB_OUTPUT
          else
            echo "sts_endpoint=" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        env:
          AWS_ENDPOINT_URL_STS: ${{ steps.endpoint_domain.outputs.sts_endpoint }}
        with:
          role-to-assume: ${{ secrets[format('{0}_TESTBED_OIDC_ROLE_ARN', matrix.test_bed)] }}
          aws-region: ${{ steps.endpoint_domain.outputs.aws_region }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Verify Repository Structure
        run: |
          echo "Repository structure:"
          find . -maxdepth 3 -type d -not -path "*/\.*" | sort
          
          echo "Checking for ${{ inputs.tf_terratest_path }} directory..."
          if [ -d "${{ inputs.tf_terratest_path }}" ]; then
            echo "✅ ${{ inputs.tf_terratest_path }} directory exists"
          else
            echo "❌ ${{ inputs.tf_terratest_path }} directory not found"
            exit 1
          fi
          
          echo "Checking for ${{ inputs.tf_terratest_examples_path }} directory..."
          if [ -d "${{ inputs.tf_terratest_examples_path }}" ]; then
            echo "✅ ${{ inputs.tf_terratest_examples_path }} directory exists"
          else
            echo "❌ ${{ inputs.tf_terratest_examples_path }} directory not found - creating it"
            mkdir -p "${{ inputs.tf_terratest_examples_path }}/complete"
          fi
          
          echo "Checking for ${{ inputs.tf_terratest_examples_path }}/complete directory..."
          if [ -d "${{ inputs.tf_terratest_examples_path }}/complete" ]; then
            echo "✅ ${{ inputs.tf_terratest_examples_path }}/complete directory exists"
          else
            echo "❌ ${{ inputs.tf_terratest_examples_path }}/complete directory not found - creating it"
            mkdir -p "${{ inputs.tf_terratest_examples_path }}/complete"
          fi

      - name: Get Dependencies
        working-directory: ${{ inputs.tf_terratest_path }}
        run: |
          go mod init test/terratest || true
          go get github.com/gruntwork-io/terratest/modules/terraform@v0.40.8
          go get github.com/stretchr/testify/assert@latest
          go mod tidy
          wget https://github.com/gruntwork-io/terratest/releases/download/v0.40.8/terratest_log_parser_linux_amd64
          chmod +x terratest_log_parser_linux_amd64

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.tf_version }}
          terraform_wrapper: false

      - name: Output Terraform Version
        run: terraform version

      - name: Generate Terraform Lock File
        if: ${{ matrix.provider_version != '' }}
        id: terraform_lock_file
        working-directory: ${{ inputs.tf_terratest_examples_path }}
        env:
          PROVIDER_JSON: ${{ toJson(matrix.provider_version) }}
        run: |
          for d in */; do
            # create artifact name for github action
            artifact_name="terraform version $(echo "${{ matrix.tf_version }}")<br>"
            # mainize terraform lock file
            touch "$d/.terraform.lock.hcl"
            # get required provider versions from matrix json
            for provider in $(jq -r 'keys | .[]' <<< $PROVIDER_JSON); do
              version=$(jq -r ".\"$provider\"" <<< $PROVIDER_JSON)
              # get provider version if contains X from terraform registry
              if [[ "$version" == *"X"* ]]; then
                for i in $(curl -s https://registry.terraform.io/v1/providers/$provider | jq -r '.versions' | jq 'reverse' | jq '.[]'); do
                  i=$(echo $i | tr -d '"')
                  declare -a semver
                  semver=($(echo "$version" | tr '.' '\n'))
                  if [[ "${semver[0]}" == "X" ]]; then
                    version=$i
                    break;
                  # if X is on second position
                  elif [[ "${semver[1]}" == "X" ]]; then
                    if [[ $i == "${semver[0]}."* ]]; then
                      version=$i
                      break;
                    fi
                  # if X is on third position
                  elif [[ "${semver[2]}" == "X" ]]; then
                    if [[ $i == "${semver[0]}.${semver[1]}."* ]]; then
                      version=$i
                      break;
                    fi
                  fi
                done
              elif [[ "$version" == "FROM_REQUIREMENTS" ]]; then
                version_match=$(grep -zoP 'required_providers\W*\{\W*aws(.|\n)*?version\W*\"\D*?(\d+\.\d+\.?\d*)\"' $GITHUB_WORKSPACE/*.tf | grep -zoP '[\d+\.]*\"$')
                version=$(echo $version_match | grep -zoP '[\d\.]+')
                num="${version//[^.]}"
                count="${#num}"
                if [[ $count == 1 ]]; then
                  version="$version.0"
                fi
              fi
              # append provider versions to artifact name
              artifact_name+="provider $(echo "$provider" | sed 's:\/:\.:g') = ${version}<br>"
              # generate terraform lock file for each provider in each terratest example directory
              echo -en "provider \"${{ inputs.tf_registry_hostname }}/$provider\" {\n  version = \"$version\"\n}\n\n" >> "$d/.terraform.lock.hcl"
            done
            cat "$d/.terraform.lock.hcl"
            echo "artifact_name=${artifact_name}" >> $GITHUB_OUTPUT
          done

      - name: Write Testbed Tfvars
        env:
          TESTBED_TFVARS: ${{ matrix.test_bed == 'AWS_ESC' && vars.AWS_ESC_TESTBED_TFVARS || vars.AWS_TESTBED_TFVARS }}
        run: |
          echo "$TESTBED_TFVARS" > ${{ inputs.tf_terratest_path }}/testbed.tfvar

      - name: Write Backend Config
        env:
          BACKEND_JSON: ${{ matrix.test_bed == 'AWS_ESC' && vars.AWS_ESC_TESTBED_BACKEND_JSON || vars.AWS_TESTBED_BACKEND_JSON }}
        run: |
          if [ -n "$BACKEND_JSON" ]; then
            echo "$BACKEND_JSON" > ${{ inputs.tf_terratest_path }}/backend.json
            echo "✅ Backend config written to ${{ inputs.tf_terratest_path }}/backend.json"
          else
            echo "⚠️ No backend config found for test bed ${{ matrix.test_bed }}, skipping"
          fi

      - name: Run Terratest
        id: terratest_run
        working-directory: ${{ inputs.tf_terratest_path }}
        env:
          TF_CLI_ARGS_plan: "-var-file=${{ github.workspace }}/${{ inputs.tf_terratest_path }}/testbed.tfvar"
          TF_CLI_ARGS_apply: "-var-file=${{ github.workspace }}/${{ inputs.tf_terratest_path }}/testbed.tfvar"
          TF_CLI_ARGS_destroy: "-var-file=${{ github.workspace }}/${{ inputs.tf_terratest_path }}/testbed.tfvar"
        run: |
          go test -v -timeout 60m 2>&1 | tee terratest-output.txt >(./terratest_log_parser_linux_amd64)
          test ${PIPESTATUS[0]} -eq 0
          echo "./out/summary.log"
        continue-on-error: true

      - name: Terratest Summary
        if: ${{ always() }}
        id: terratest_summary
        working-directory: ${{ inputs.tf_terratest_path }}
        run: |
          echo '### TERRATEST SUMMARY :octocat:' >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.terraform_lock_file.outputs.artifact_name }}' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| result | test |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|' >> $GITHUB_STEP_SUMMARY

          if [[ ! -f "./out/summary.log" ]]; then
            echo '' >> $GITHUB_STEP_SUMMARY
            echo ":x: missing terratest log file 'summary.log'" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          test_exists=false
          test_failed=false
          while IFS= read -r line
          do
            if [[ "$line" == *"--- PASS"* ]]; then
              echo "| $line |" | sed 's/--- PASS:/:white_check_mark: |/g' >> $GITHUB_STEP_SUMMARY
              test_exists=true
            elif [[ "$line" == *"--- FAIL"* ]]; then
              echo "| $line |" | sed 's/--- FAIL:/:x: |/g' >> $GITHUB_STEP_SUMMARY
              test_exists=true
              test_failed=true
            fi
          done < "./out/summary.log"

          if [[ $test_exists == false ]]; then
            echo '' >> $GITHUB_STEP_SUMMARY
            echo ":x: no terratest results found in 'summary.log'" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [[ $test_failed == true ]]; then
            exit 1
          fi
        continue-on-error: true

      - name: Terratest Outcome
        if: ${{ steps.terratest_summary.outcome == 'failure' || steps.terratest_summary.outputs.exitcode == '1' }}
        run: exit 1

      - name: Upload Terratest output for autofix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autofix-terratest-${{ strategy.job-index }}
          path: ${{ inputs.tf_terratest_path }}/terratest-output.txt
          if-no-files-found: ignore
          retention-days: 1

  consume_outputs:
    needs: [terratest_run]
    runs-on: ubuntu-latest
    steps:
      - name: Use Outputs Steps
        run: |
          echo '### Workflow Outputs Summary' >> $GITHUB_STEP_SUMMARY
          echo '| Step | Status  |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|' >> $GITHUB_STEP_SUMMARY
          echo "| Terratest Run | ${{ needs.terratest_run.outputs.terratest_status  }} |" >> $GITHUB_STEP_SUMMARY