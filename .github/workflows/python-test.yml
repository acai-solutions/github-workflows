name: Python Pytest Matrix

on:
  workflow_call:
    inputs:
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      py_version:
        description: "Python version"
        default: "3.12"
        required: false
        type: string
      py_source_path:
        description: "Relative path from repo root to the Python package root (where pyproject.toml lives)"
        default: "shared/python"
        required: false
        type: string
      py_test_modules:
        description: >
          JSON array of module names whose _test/ folders should be exercised.
          Each entry must correspond to a sub-package under the source path
          that contains a _test/ directory with test_*.py files.
          Example: '["logging","storage","xml_parser"]'
        required: true
        type: string
      py_test_extra_pip_packages:
        description: >
          Space-separated pip packages to install on top of the editable
          package itself.  Example: "lxml beautifulsoup4 psycopg2-binary"
        default: ""
        required: false
        type: string

    outputs:
      all_tests_passed:
        description: "true when every module's tests succeeded"
        value: ${{ jobs.pytest_gate.outputs.passed }}

defaults:
  run:
    shell: bash

jobs:
  # ── Run pytest per module in parallel ───────────────────────────────
  pytest_module:
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(inputs.py_test_modules) }}

    name: "pytest · ${{ matrix.module }}"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ inputs.py_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.py_version }}
          cache: pip
          cache-dependency-path: ${{ inputs.py_source_path }}/pyproject.toml

      - name: Install package and test dependencies
        working-directory: ${{ inputs.py_source_path }}
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .

          # Extra packages requested by the caller
          if [[ -n "${{ inputs.py_test_extra_pip_packages }}" ]]; then
            pip install ${{ inputs.py_test_extra_pip_packages }}
          fi

      - name: Run tests — ${{ matrix.module }}
        working-directory: ${{ inputs.py_source_path }}
        run: |
          # Discover the top-level package name from pyproject.toml
          PKG=$(python -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml','rb') as f:
              cfg = tomllib.load(f)
          print(cfg['project']['name'])
          ")

          # Run pytest, capturing both JUnit XML and verbose output
          pytest "${PKG}/${{ matrix.module }}/_test/" \
            -v \
            --tb=long \
            --cov="${PKG}.${{ matrix.module }}" \
            --cov-report=term-missing \
            --junitxml="results-${{ matrix.module }}.xml" \
            2>&1 | tee "pytest-output-${{ matrix.module }}.txt" \
            || true

          # Preserve the actual exit code from the XML
          python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('results-${{ matrix.module }}.xml')
          root = tree.getroot()
          failures = int(root.attrib.get('failures', 0))
          errors = int(root.attrib.get('errors', 0))
          sys.exit(1 if (failures + errors) > 0 else 0)
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.module }}
          path: |
            ${{ inputs.py_source_path }}/results-${{ matrix.module }}.xml
            ${{ inputs.py_source_path }}/pytest-output-${{ matrix.module }}.txt

  # ── Gate job — single required status check ─────────────────────────
  pytest_gate:
    if: always()
    needs: pytest_module
    runs-on: ${{ inputs.runner_type }}
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Evaluate test results
        id: check
        run: |
          RESULT="${{ needs.pytest_module.result }}"

          if [[ "${RESULT}" == "success" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "✅ All module tests passed"
          elif [[ "${RESULT}" == "cancelled" ]]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Tests were cancelled (likely by concurrency group) — skipping gate"
            # Exit 0: don't fail the gate for cancellations, the whole
            # workflow is being superseded by a newer run anyway.
            exit 0
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "::error::One or more module tests failed"
            exit 1
          fi