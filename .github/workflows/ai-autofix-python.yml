name: Python AI Autofix (Claude Code)

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: Auto-fixes Python findings on a dedicated _ai branch
# using Claude Code (anthropics/claude-code-action).
#
# Each tool (flake8, bandit, tests) runs as its own Claude session to keep
# context windows small and failures isolated. After each session, changes
# are committed separately. On completion a PR is opened: _ai → feature.
#
# Branch Strategy (_ai):
#   feature branch fails → _ai created → fixes committed → PR opened
#   _ai fails again    → next iteration → more commits → CI re-runs
#   _ai passes         → merge PR (_ai → feature)
#   max iterations hit  → stops (no infinite loop)
#
# Prerequisites:
#   - ANTHROPIC_API_KEY org/repo secret
#   - GH_RELEASE_APP_ID + GH_RELEASE_APP_PRIVATE_KEY secrets
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      gh_wf_config_repo:
        description: "Public repo where linting config is stored"
        default: "acai-solutions/github-workflow-configs"
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: "Ref or branch of gh_wf_config_repo"
        default: "main"
        required: false
        type: string
      commit_user:
        description: "Username for autofix commits"
        default: "github-actions[bot]"
        required: false
        type: string
      commit_email:
        description: "Email for autofix commits"
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        required: false
        type: string
      py_version:
        description: "Python version"
        default: "3.12"
        required: false
        type: string
      py_source_path:
        description: "Relative path from repo root to the Python package root"
        default: "."
        required: false
        type: string
      py_lint_config_path:
        description: "Path to python config in gh_wf_config_repo"
        default: "python"
        required: false
        type: string
      py_test_modules:
        description: >
          JSON array of module names whose _test/ folders should be exercised.
          Example: '["logging","storage","xml_parser"]'
        default: "[]"
        required: false
        type: string
      py_test_auto_discover:
        description: >
          When true, pytest auto-discovers all tests recursively from
          py_source_path instead of using py_test_modules.
        required: false
        default: true
        type: boolean
      py_test_extra_pip_packages:
        description: "Space-separated extra pip packages to install"
        default: ""
        required: false
        type: string
      py_ai_autofix_flake8:
        description: "Whether to fix flake8 findings (Python)"
        required: false
        default: true
        type: boolean
      py_ai_autofix_bandit:
        description: "Whether to fix bandit findings (Python)"
        required: false
        default: true
        type: boolean
      py_ai_autofix_tests:
        description: "Whether to fix failing tests (Python)"
        required: false
        default: false
        type: boolean
      py_ai_autofix_max_attempts:
        description: "Maximum number of Python autofix iterations on _ai branch"
        required: false
        default: 3
        type: number
    secrets:
      GH_RELEASE_APP_ID:
        required: true
      GH_RELEASE_APP_PRIVATE_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false

    outputs:
      fixes_applied:
        description: "Whether fixes were pushed to _ai branch"
        value: ${{ jobs.autofix.outputs.fixes_applied }}
      fix_summary:
        description: "Summary of applied fixes"
        value: ${{ jobs.autofix.outputs.fix_summary }}
      ai_branch:
        description: "Name of the _ai branch"
        value: ${{ jobs.guard.outputs.ai_branch }}
      feature_branch:
        description: "Name of the feature branch"
        value: ${{ jobs.guard.outputs.feature_branch }}
      iteration:
        description: "Current iteration count after this run"
        value: ${{ jobs.guard.outputs.iteration }}
defaults:
  run:
    shell: bash

jobs:
  # ── Guard: branch context + iteration limit ─────────────────────────────
  guard:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      is_ai_branch: ${{ steps.detect.outputs.is_ai_branch }}
      current_branch: ${{ steps.detect.outputs.current_branch }}
      ai_branch: ${{ steps.detect.outputs.ai_branch }}
      feature_branch: ${{ steps.detect.outputs.feature_branch }}
      iteration: ${{ steps.detect.outputs.iteration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Detect branch context
        id: detect
        run: |
          BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"

          if [[ "${BRANCH}" == *_ai ]]; then
            IS_AI=true
            FEATURE="${BRANCH%_ai}"
            AI="${BRANCH}"
          else
            IS_AI=false
            FEATURE="${BRANCH}"
            AI="${BRANCH}_ai"
          fi

          echo "current_branch=${BRANCH}"   >> "$GITHUB_OUTPUT"
          echo "is_ai_branch=${IS_AI}"    >> "$GITHUB_OUTPUT"
          echo "feature_branch=${FEATURE}"  >> "$GITHUB_OUTPUT"
          echo "ai_branch=${AI}"          >> "$GITHUB_OUTPUT"

          # Derive iteration count from scoped git tags (autofix/<ai>-iter-N)
          # This is robust against manual commits containing any particular string.
          ITERATION=0
          if [[ "${IS_AI}" == "true" ]]; then
            git fetch origin --tags 2>/dev/null || true
            TAG_PREFIX="autofix/$(echo "${AI}" | tr '/' '-')-iter-"
            LATEST=$(git tag -l "${TAG_PREFIX}*" --sort=version:refname | tail -1)
            if [[ -n "${LATEST}" ]]; then
              ITERATION="${LATEST##*-iter-}"
            fi
          fi
          echo "iteration=${ITERATION}" >> "$GITHUB_OUTPUT"

          MAX=${{ inputs.py_ai_autofix_max_attempts }}
          if [[ "${ITERATION}" -ge "${MAX}" ]]; then
            echo "🛑 Max iterations (${MAX}) reached — stopping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

          echo "📌 Branch: ${BRANCH} | Feature: ${FEATURE} | AI: ${AI}"
          echo "📌 Is _ai: ${IS_AI} | Iteration: ${ITERATION}/${MAX}"

  # ── Main autofix job ────────────────────────────────────────────────────
  autofix:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner_type }}
    permissions:
      pull-requests: write
    outputs:
      fixes_applied: ${{ steps.set_outputs.outputs.fixes_applied }}
      fix_summary: ${{ steps.set_outputs.outputs.fix_summary }}
      next_iteration: ${{ steps.set_outputs.outputs.next_iteration }}

    steps:
      # ── Auth + Checkout ─────────────────────────────────────────────────
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.guard.outputs.current_branch }}
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      # ── Branch setup ────────────────────────────────────────────────────
      - name: Setup _ai branch
        run: |
          git config --local user.name  "${{ inputs.commit_user }}"
          git config --local user.email "${{ inputs.commit_email }}"

          if [[ "${{ needs.guard.outputs.is_ai_branch }}" == "true" ]]; then
            echo "🔄 Already on _ai branch"
          else
            AI="${{ needs.guard.outputs.ai_branch }}"
            git fetch origin
            if git ls-remote --exit-code --heads origin "${AI}" >/dev/null 2>&1; then
              git checkout -b "${AI}" "origin/${AI}"
              echo "🔄 Checked out existing _ai branch"
            else
              git checkout -b "${AI}"
              echo "🆕 Created _ai branch: ${AI}"
            fi
          fi
          echo "✅ Branch: $(git branch --show-current)"

      - name: Exclude CI artifacts from git
        run: |
          mkdir -p .git/info
          cat >> .git/info/exclude <<'EOF'
          node_modules/
          __pycache__/
          *.egg-info/
          .pytest_cache/
          EOF

      # ── Python environment ──────────────────────────────────────────────
      - name: Set up Python ${{ inputs.py_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.py_version }}
          cache: pip

      - name: Install tools and project
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

          if [[ -n "${{ inputs.py_test_extra_pip_packages }}" ]]; then
            pip install ${{ inputs.py_test_extra_pip_packages }}
          fi

          if [[ -f "${{ inputs.py_source_path }}/pyproject.toml" ]]; then
            pip install -e "${{ inputs.py_source_path }}"
          fi

          if [[ "${{ inputs.py_ai_autofix_tests }}" == "true" ]]; then
            pip install pytest pytest-cov
          fi

      # ══════════════════════════════════════════════════════════════════════
      # FLAKE8
      # ══════════════════════════════════════════════════════════════════════

      - name: Fetch flake8 config
        if: inputs.py_ai_autofix_flake8
        id: get_flake8_config
        run: |
          if [[ -f ".flake8" ]]; then
            echo "✅ Using local .flake8"
            echo "config_source=local" >> "$GITHUB_OUTPUT"
            head -20 .flake8 || true
            exit 0
          fi

          echo "Fetching .flake8 from: ${{ inputs.gh_wf_config_repo }}/${{ inputs.py_lint_config_path }}/.flake8@${{ inputs.gh_wf_config_repo_ref }}"

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/${{ inputs.gh_wf_config_repo }}/contents/${{ inputs.py_lint_config_path }}/.flake8?ref=${{ inputs.gh_wf_config_repo_ref }}")

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)
          CONTENT=$(echo "$HTTP_RESPONSE" | head -n -1)

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "$CONTENT" > .flake8
            echo "✅ Downloaded .flake8 from central repo"
            echo "config_source=remote" >> "$GITHUB_OUTPUT"
            head -20 .flake8
          elif [[ "$HTTP_CODE" == "404" ]]; then
            echo "⚠️ .flake8 not found in central repo at ${{ inputs.py_lint_config_path }}/.flake8"
            echo "config_source=none" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Failed to download .flake8 (HTTP $HTTP_CODE)"
            echo "config_source=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Run flake8
        if: inputs.py_ai_autofix_flake8
        id: run_flake8
        run: |
          CFG_OPT=""
          if [[ "${{ steps.get_flake8_config.outputs.config_source }}" == "local" || "${{ steps.get_flake8_config.outputs.config_source }}" == "remote" ]]; then
            CFG_OPT="--config .flake8"
          fi
          flake8 . ${CFG_OPT} --format=default > /tmp/flake8-findings.txt 2>&1 || true

          if [[ -s /tmp/flake8-findings.txt ]]; then
            COUNT=$(wc -l < /tmp/flake8-findings.txt | tr -d ' ')
            echo "⚠️ ${COUNT} flake8 findings"
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No flake8 findings"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix flake8 findings"
        id: claude_flake8
        if: inputs.py_ai_autofix_flake8 && steps.run_flake8.outputs.has_findings == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix all flake8 findings in /tmp/flake8-findings.txt.

            Steps:
            1. Read /tmp/flake8-findings.txt to see every finding.
            2. For each finding, edit the source file to fix the issue.
            3. Re-run: flake8 . --format=default
            4. Iterate until flake8 is clean.

            Common fixes:
            - F401 unused import → remove the import line
            - F841 unused variable → remove the assignment or use the variable
            - E731 lambda assignment → replace with a def statement
            - E741 ambiguous name → rename to a descriptive name
            - C901 too complex → extract helper functions

            Rules:
            - Do NOT modify .flake8, pyproject.toml, or any config file.
            - Do NOT add comments explaining your changes.
            - Do NOT commit anything — just edit files.
            - Preserve existing docstrings and formatting style.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-haiku-4-5-20251001
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: "⚠️ Warn: flake8 Claude session incomplete"
        if: always() && inputs.py_ai_autofix_flake8 && steps.run_flake8.outputs.has_findings == 'true' && steps.claude_flake8.outcome == 'failure'
        run: |
          echo "::warning::Claude flake8 session did not complete (max-turns or API error) — partial fixes may have been applied"
          echo "⚠️ **Claude flake8 session incomplete** — hit max-turns or API error. Partial fixes may have been committed." >> $GITHUB_STEP_SUMMARY

      - name: Clean up downloaded .flake8
        if: inputs.py_ai_autofix_flake8
        run: |
          if [[ "${{ steps.get_flake8_config.outputs.config_source }}" == "remote" && -f ".flake8" ]]; then
            if ! git show HEAD:".flake8" &>/dev/null 2>&1; then
              rm -f .flake8
              echo "🧹 Removed downloaded .flake8"
            fi
          fi

      - name: Commit flake8 fixes
        id: commit_flake8
        if: inputs.py_ai_autofix_flake8
        run: |
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))

          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No flake8 changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          git add -A
          git commit -m "fix(flake8): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed flake8 fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # BANDIT
      # ══════════════════════════════════════════════════════════════════════

      - name: Run bandit
        if: inputs.py_ai_autofix_bandit
        id: run_bandit
        run: |
          bandit -r . -f txt > /tmp/bandit-findings.txt 2>&1 || true

          if grep -q "Issue:" /tmp/bandit-findings.txt; then
            COUNT=$(grep -c "Issue:" /tmp/bandit-findings.txt || echo "0")
            echo "⚠️ ${COUNT} bandit findings"
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No bandit findings"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix bandit findings"
        id: claude_bandit
        if: inputs.py_ai_autofix_bandit && steps.run_bandit.outputs.has_findings == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix all security findings in /tmp/bandit-findings.txt.

            Steps:
            1. Read /tmp/bandit-findings.txt to see every finding.
            2. Fix each issue without changing observable behavior.
            3. For hardcoded secrets: replace with os.environ lookups or config files.
            4. For unsafe functions: replace with safe alternatives.
            5. If a finding is a confirmed false positive (e.g. test fixtures): add # nosec BXXX with the exact code.
            6. Re-run: bandit -r . -f txt
            7. Iterate until no fixable findings remain.

            Rules:
            - Do NOT modify pyproject.toml or any config file.
            - Do NOT add explanatory comments (# nosec comments are allowed).
            - Do NOT commit anything — just edit files.
            - Preserve existing code structure and docstrings.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-haiku-4-5-20251001
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: "⚠️ Warn: bandit Claude session incomplete"
        if: always() && inputs.py_ai_autofix_bandit && steps.run_bandit.outputs.has_findings == 'true' && steps.claude_bandit.outcome == 'failure'
        run: |
          echo "::warning::Claude bandit session did not complete (max-turns or API error) — partial fixes may have been applied"
          echo "⚠️ **Claude bandit session incomplete** — hit max-turns or API error. Partial fixes may have been committed." >> $GITHUB_STEP_SUMMARY

      - name: Commit bandit fixes
        id: commit_bandit
        if: inputs.py_ai_autofix_bandit
        run: |
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))

          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No bandit changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          git add -A
          git commit -m "fix(bandit): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed bandit fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # TESTS
      # ══════════════════════════════════════════════════════════════════════

      - name: Run pytest
        if: inputs.py_ai_autofix_tests
        id: run_pytest
        run: |
          SRC="${{ inputs.py_source_path }}"
          AUTO_DISCOVER="${{ inputs.py_test_auto_discover }}"
          TEST_MODULES='${{ inputs.py_test_modules }}'
          PYTEST_PATHS=""

          if [[ "${AUTO_DISCOVER}" != "true" && "${TEST_MODULES}" != "[]" ]]; then
            PKG=$(cd "${SRC}" && python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml','rb') as f:
              cfg = tomllib.load(f)
          print(cfg['project']['name'])
          " 2>/dev/null || echo "")

            if [[ -n "${PKG}" ]]; then
              for MOD in $(echo "${TEST_MODULES}" | python3 -c "import json,sys; [print(m) for m in json.load(sys.stdin)]"); do
                PYTEST_PATHS="${PYTEST_PATHS} ${PKG}/${MOD}/_test/"
              done
            fi
          fi

          cd "${SRC}"
          if [[ -n "${PYTEST_PATHS}" ]]; then
            python -m pytest ${PYTEST_PATHS} -v --tb=long > /tmp/pytest-failures.txt 2>&1 || true
          else
            python -m pytest . -v --tb=long > /tmp/pytest-failures.txt 2>&1 || true
          fi

          if grep -qE "^FAILED" /tmp/pytest-failures.txt; then
            COUNT=$(grep -cE "^FAILED" /tmp/pytest-failures.txt || echo "0")
            echo "⚠️ ${COUNT} test failures"
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "✅ All tests pass"
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix test failures"
        id: claude_tests
        if: inputs.py_ai_autofix_tests && steps.run_pytest.outputs.has_failures == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix the failing tests listed in /tmp/pytest-failures.txt.

            Working directory: ${{ inputs.py_source_path }}

            Steps:
            1. Read /tmp/pytest-failures.txt to identify every failure.
            2. Fix the SOURCE CODE to make the failing tests pass.
            3. If a test file has obvious bugs (wrong imports, typos), fix those too.
            4. Re-run the specific failing tests to verify they pass.
            5. Iterate until all previously failing tests pass.

            Rules:
            - Only edit files under ${{ inputs.py_source_path }}/
            - Do NOT weaken, remove, or skip test assertions.
            - Do NOT add comments explaining your changes.
            - Do NOT commit anything — just edit files.
            - Preserve existing code structure and docstrings.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-sonnet-4-6
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: "⚠️ Warn: tests Claude session incomplete"
        if: always() && inputs.py_ai_autofix_tests && steps.run_pytest.outputs.has_failures == 'true' && steps.claude_tests.outcome == 'failure'
        run: |
          echo "::warning::Claude tests session did not complete (max-turns or API error) — partial fixes may have been applied"
          echo "⚠️ **Claude tests session incomplete** — hit max-turns or API error. Partial fixes may have been committed." >> $GITHUB_STEP_SUMMARY

      - name: Commit test fixes
        id: commit_tests
        if: inputs.py_ai_autofix_tests
        run: |
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))

          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No test changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          git add -A
          git commit -m "fix(tests): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed test fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # PUSH + PR
      # ══════════════════════════════════════════════════════════════════════

      - name: Aggregate outputs
        id: set_outputs
        run: |
          F="${{ steps.commit_flake8.outputs.committed }}"
          B="${{ steps.commit_bandit.outputs.committed }}"
          T="${{ steps.commit_tests.outputs.committed }}"

          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))
          echo "next_iteration=${NEXT}" >> "$GITHUB_OUTPUT"

          if [[ "${F}" == "true" || "${B}" == "true" || "${T}" == "true" ]]; then
            echo "fixes_applied=true" >> "$GITHUB_OUTPUT"
            PARTS=()
            [[ "${F}" == "true" ]] && PARTS+=("flake8")
            [[ "${B}" == "true" ]] && PARTS+=("bandit")
            [[ "${T}" == "true" ]] && PARTS+=("tests")
            printf -v SUMMARY '%s,' "${PARTS[@]}"
            echo "fix_summary=claude-code:${SUMMARY%,}" >> "$GITHUB_OUTPUT"
          else
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
            echo "fix_summary=No fixes needed" >> "$GITHUB_OUTPUT"
          fi

      - name: Push _ai branch
        if: steps.set_outputs.outputs.fixes_applied == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          AI="${{ needs.guard.outputs.ai_branch }}"
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))
          TAG="autofix/$(echo "${AI}" | tr '/' '-')-iter-${NEXT}"

          git remote set-url origin \
            "https://x-access-token:${GH_APP_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${AI}"
          git tag -f "${TAG}"
          git push origin "${TAG}" --force
          echo "✅ Pushed ${AI} — tagged ${TAG}"

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo '# 🤖 Python AI Autofix (Claude Code)' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| _ai branch | \`${{ needs.guard.outputs.ai_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Feature branch | \`${{ needs.guard.outputs.feature_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Iteration | ${{ needs.guard.outputs.iteration }} / ${{ inputs.py_ai_autofix_max_attempts }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flake8 | ${{ inputs.py_ai_autofix_flake8 && '✅' || '⏭️' }} — committed: ${{ steps.commit_flake8.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | ${{ inputs.py_ai_autofix_bandit && '✅' || '⏭️' }} — committed: ${{ steps.commit_bandit.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests  | ${{ inputs.py_ai_autofix_tests && '✅' || '⏭️' }} — committed: ${{ steps.commit_tests.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fixes applied | ${{ steps.set_outputs.outputs.fixes_applied || 'false' }} |" >> $GITHUB_STEP_SUMMARY

  # ── Create PR: _ai → feature ──────────────────────────────────────────
  create_ai_pr:
    needs: [guard, autofix]
    if: needs.autofix.outputs.fixes_applied == 'true'
    uses: ./.github/workflows/ai-autofix-create-ai-pr.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      app_id: GH_RELEASE_APP_ID
      app_private_key: GH_RELEASE_APP_PRIVATE_KEY
      ai_branch: ${{ needs.guard.outputs.ai_branch }}
      feature_branch: ${{ needs.guard.outputs.feature_branch }}
      pr_title: "fix: Python autofix für `${{ needs.guard.outputs.feature_branch }}` (iteration ${{ needs.autofix.outputs.next_iteration }})"
      pr_body: |
        ## 🤖 Python AI Autofix (Claude Code)

        Automated fixes applied by Claude Code on `${{ needs.guard.outputs.ai_branch }}` → `${{ needs.guard.outputs.feature_branch }}`.

        **Fix summary:** ${{ needs.autofix.outputs.fix_summary }}

        > Review and merge when CI passes on this branch.
      pr_ready_comment: |
        ✅ **All checks passed** on `${{ needs.guard.outputs.ai_branch }}`.

        This PR is ready for review and merge.
    secrets: inherit
