name: Terraform AI Autofix

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: Auto-fixes Terraform formatting on a dedicated _cop
# branch using `terraform fmt` (deterministic — no AI needed).
#
# Branch Strategy (_cop):
#   feature branch fails → _cop created → fmt applied → push triggers CI
#   _cop passes          → caller creates PR (_cop → feature)
#
# Prerequisites:
#   - GH_RELEASE_APP_ID + GH_RELEASE_APP_PRIVATE_KEY secrets
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      tf_version:
        description: "Terraform version for formatting"
        default: "latest"
        required: false
        type: string
      commit_user:
        description: "Username for autofix commits"
        default: "github-actions[bot]"
        required: false
        type: string
      commit_email:
        description: "Email for autofix commits"
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        required: false
        type: string

    secrets:
      GH_RELEASE_APP_ID:
        required: true
      GH_RELEASE_APP_PRIVATE_KEY:
        required: true

    outputs:
      fixes_applied:
        description: "Whether fixes were pushed to _cop branch"
        value: ${{ jobs.autofix.outputs.fixes_applied }}
      cop_branch:
        description: "Name of the _cop branch"
        value: ${{ jobs.autofix.outputs.cop_branch }}

defaults:
  run:
    shell: bash

jobs:
  autofix:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      fixes_applied: ${{ steps.commit.outputs.fixes_applied }}
      cop_branch: ${{ steps.branch.outputs.cop_branch }}

    steps:
      # ── Auth + Checkout ─────────────────────────────────────────────────
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      # ── Branch setup ────────────────────────────────────────────────────
      - name: Setup _cop branch
        id: branch
        run: |
          BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"
          BASE="${BRANCH%_cop}"
          COP="${BASE}_cop"

          echo "cop_branch=${COP}" >> "$GITHUB_OUTPUT"

          git config --local user.name  "${{ inputs.commit_user }}"
          git config --local user.email "${{ inputs.commit_email }}"

          if [[ "${BRANCH}" == *_cop ]]; then
            echo "🔄 Already on _cop branch"
          else
            git fetch origin
            if git ls-remote --exit-code --heads origin "${COP}" >/dev/null 2>&1; then
              git checkout -b "${COP}" "origin/${COP}"
              echo "🔄 Checked out existing _cop branch"
            else
              git checkout -b "${COP}"
              echo "🆕 Created _cop branch: ${COP}"
            fi
          fi
          echo "✅ Branch: $(git branch --show-current)"

      # ── Terraform fmt ───────────────────────────────────────────────────
      - name: Setup Terraform ${{ inputs.tf_version }}
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Apply terraform fmt
        id: tf_fmt
        run: |
          if terraform fmt -check -recursive >/dev/null 2>&1; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "✅ Formatting already correct"
          else
            terraform fmt -recursive
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "✅ terraform fmt applied"
          fi

      # ── Commit + Push ───────────────────────────────────────────────────
      - name: Commit fixes
        id: commit
        run: |
          COP="${{ steps.branch.outputs.cop_branch }}"

          if [[ -z "$(git status -s)" ]]; then
            echo "✅ No formatting changes needed"
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          git commit -m "fix: terraform fmt auto-fix

          copilot-autofix: true"

          echo "fixes_applied=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed terraform fmt on ${COP}"

      - name: Push _cop branch
        if: steps.commit.outputs.fixes_applied == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          COP="${{ steps.branch.outputs.cop_branch }}"
          git remote set-url origin \
            "https://x-access-token:${GH_APP_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${COP}"
          echo "✅ Pushed ${COP} — CI re-triggers"

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo '# 🔧 Terraform AI Autofix' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| _cop branch | \`${{ steps.branch.outputs.cop_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| terraform fmt | ${{ steps.tf_fmt.outputs.changes == 'true' && '✅ Applied' || '⏭️ Clean' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ steps.commit.outputs.fixes_applied == 'true' && '🔄 Fixes pushed' || '✅ No changes' }} |" >> $GITHUB_STEP_SUMMARY
