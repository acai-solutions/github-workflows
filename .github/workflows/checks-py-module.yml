---
name: Python Module Checks
on:
  workflow_call:
    inputs:
      concurrency_group:
        description: Name of concurrency group to manage concurrent github action runs
        default: ${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        required: false
        type: string
      runner_type:
        description: Type of runner (GitHub-hosted or self-hosted)
        required: false
        default: ubuntu-latest
        type: string
      commit_user:
        description: Username which should be used for commits by github action
        default: github-actions
        required: false
        type: string
      commit_email:
        description: Email which should be used for commits by github action
        default: noreply@github.com
        required: false
        type: string
      gh_wf_config_repo:
        description: Public repo where GitHub workflow config is stored
        default: acai-solutions/github-workflow-configs
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: Ref or branch of gh_wf_config_repo
        default: main
        required: false
        type: string
      linting_include:
        description: Whether to include Python code quality checks
        required: false
        default: true
        type: boolean
      linting_allow_failures:
        description: Whether to allow Python linting failures to pass the pipeline
        required: false
        default: false
        type: boolean
      python_version:
        description: Python version
        default: "3.11"
        required: false
        type: string
      python_lint_config_path:
        description: Path to python config in gh_wf_config_repo (e.g. "python")
        default: python
        required: false
        type: string
      testing_include:
        description: Whether to include pytest module tests
        required: false
        default: false
        type: boolean
      python_source_path:
        description: Relative path from repo root to the Python package root (where pyproject.toml lives)
        default: shared/python
        required: false
        type: string
      test_modules:
        description: >
          JSON array of module names whose _test/ folders should be exercised.
          Example: '["logging","storage","xml_parser"]'
        default: "[]"
        required: false
        type: string
      extra_pip_packages:
        description: Space-separated pip packages to install for tests
        default: ""
        required: false
        type: string

      # ── AI Autofix (optional) ───────────────────────────────────────────
      autofix_include:
        description: "Whether to run AI autofix on _cop branch when checks fail"
        required: false
        default: false
        type: boolean
      copilot_fix_flake8:
        description: "Whether Claude should fix flake8 findings"
        required: false
        default: true
        type: boolean
      copilot_fix_bandit:
        description: "Whether Claude should fix bandit findings"
        required: false
        default: true
        type: boolean
      copilot_fix_tests:
        description: "Whether Claude should fix failing tests"
        required: false
        default: false
        type: boolean

    outputs:
      all_steps_passed:
        description: Indicates if all pipeline steps passed successfully
        value: ${{ jobs.py_module_checks_summary.outputs.all_passed }}
      python_base_status:
        description: Python base pipeline status
        value: ${{ jobs.python_base.outputs.all_steps_passed }}
      python_tests_status:
        description: Python tests pipeline status
        value: ${{ jobs.python_tests.outputs.all_tests_passed }}
      autofix_applied:
        description: Whether AI autofix was applied
        value: ${{ jobs.python_ai_autofix.outputs.fixes_applied }}
      cop_branch:
        description: Name of the _cop branch used for fixes
        value: ${{ jobs.python_ai_autofix.outputs.cop_branch }}

concurrency:
  group: ${{ format('{0}:{1}', inputs.concurrency_group, github.workflow) }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Quality checks (Black, isort, Flake8, Bandit) ───────────────────
  python_base:
    if: ${{ always() }}
    uses: acai-solutions/github-workflows/.github/workflows/python-base.yml@main
    with:
      concurrency_group: ${{ inputs.concurrency_group }}
      runner_type: ${{ inputs.runner_type }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
      gh_wf_config_repo: ${{ inputs.gh_wf_config_repo }}
      gh_wf_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      linting_include: ${{ inputs.linting_include }}
      linting_allow_failures: ${{ inputs.linting_allow_failures }}
      python_version: ${{ inputs.python_version }}
      python_config_path: ${{ inputs.python_lint_config_path }}
    secrets: inherit

  # ── Pytest per module ───────────────────────────────────────────────
  python_tests:
    if: ${{ inputs.testing_include && inputs.test_modules != '[]' }}
    uses: acai-solutions/github-workflows/.github/workflows/python-test.yml@py_test
    with:
      runner_type: ${{ inputs.runner_type }}
      python_version: ${{ inputs.python_version }}
      python_source_path: ${{ inputs.python_source_path }}
      test_modules: ${{ inputs.test_modules }}
      extra_pip_packages: ${{ inputs.extra_pip_packages }}
    secrets: inherit

  # ── AI Autofix on _cop branch (only when checks fail) ───────────────
  python_ai_autofix:
    needs:
      - python_base
      - python_tests
    if: |
      always() &&
      inputs.autofix_include &&
      (needs.python_base.outputs.all_steps_passed != 'true' ||
       needs.python_tests.outputs.all_tests_passed != 'true') &&
      !(needs.python_base.result == 'skipped' &&
        needs.python_tests.result == 'skipped')
    uses: acai-solutions/github-workflows/.github/workflows/python-ai-autofix.yml@py_test
    with:
      runner_type: ${{ inputs.runner_type }}
      python_version: ${{ inputs.python_version }}
      python_source_path: ${{ inputs.python_source_path }}
      copilot_fix_flake8: ${{ inputs.copilot_fix_flake8 }}
      copilot_fix_bandit: ${{ inputs.copilot_fix_bandit }}
      copilot_fix_tests: ${{ inputs.copilot_fix_tests }}
      test_modules: ${{ inputs.test_modules }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
      extra_pip_packages: ${{ inputs.extra_pip_packages }}
      gh_wf_config_repo: ${{ inputs.gh_wf_config_repo }}
      gh_wf_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      python_config_path: ${{ inputs.python_lint_config_path }}
    secrets: inherit

  # ── Strip _cop suffix to derive feature branch name ─────────────────
  prep_cop_pr:
    needs:
      - python_base
      - python_tests
      - python_ai_autofix
    if: |
      always() &&
      inputs.autofix_include &&
      endsWith(github.ref_name, '_cop') &&
      (needs.python_base.outputs.all_steps_passed == 'true' || needs.python_base.result == 'skipped') &&
      (needs.python_tests.outputs.all_tests_passed == 'true' || needs.python_tests.result == 'skipped')
    runs-on: ${{ inputs.runner_type }}
    outputs:
      feature_branch: ${{ steps.strip.outputs.feature_branch }}
    steps:
      - name: Derive feature branch
        id: strip
        run: echo "feature_branch=${GITHUB_REF_NAME%_cop}" >> "$GITHUB_OUTPUT"

  # ── Create PR: _cop → feature (when checks pass on _cop) ───────────
  create_cop_pr:
    needs:
      - python_base
      - python_tests
      - python_ai_autofix
      - prep_cop_pr
    if: needs.prep_cop_pr.result == 'success'
    uses: acai-solutions/github-workflows/.github/workflows/create-cop-pr.yml@py_test
    with:
      runner_type: ${{ inputs.runner_type }}
      app_id: GH_RELEASE_APP_ID
      app_private_key: GH_RELEASE_APP_PRIVATE_KEY
      pr_title: "fix: AI Auto-Fixes für `${{ needs.prep_cop_pr.outputs.feature_branch }}`"
      pr_body: |
        ## 🤖 AI Auto-Fix PR

        Automatische Code-Korrekturen für Branch `${{ needs.prep_cop_pr.outputs.feature_branch }}`.
        Alle Checks bestanden auf `${{ github.ref_name }}`.

        **Bitte Review durchführen und bei Zufriedenheit mergen.**

        ---
        _Erstellt durch die AI Autofix CI-Pipeline (Claude Code)._
      pr_ready_comment: |
        ✅ **Alle Checks bestanden** auf `${{ github.ref_name }}`.

        Dieser PR ist bereit zum Review und Merge.
    secrets:
      GH_RELEASE_APP_ID: ${{ secrets.GH_RELEASE_APP_ID }}
      GH_RELEASE_APP_PRIVATE_KEY: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

  # ── Summary gate ────────────────────────────────────────────────────
  py_module_checks_summary:
    needs:
      - python_base
      - python_tests
      - python_ai_autofix
      - create_cop_pr
    runs-on: ${{ inputs.runner_type }}
    if: always()
    outputs:
      all_passed: ${{ steps.status.outputs.all_passed }}
    steps:
      - name: Summary
        run: |
          echo '# 📊 Python Module Checks' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Component | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----------|--------|' >> $GITHUB_STEP_SUMMARY
          echo "| 🐍 Quality (Black/isort/Flake8/Bandit) | ${{ needs.python_base.outputs.all_steps_passed == 'true' && '✅' || needs.python_base.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.python_tests.outputs.all_tests_passed == 'true' && '✅' || needs.python_tests.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 AI Autofix | ${{ needs.python_ai_autofix.outputs.fixes_applied == 'true' && '✅ Applied' || needs.python_ai_autofix.result == 'skipped' && '⏭️' || '—' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 _cop PR | ${{ needs.create_cop_pr.result == 'success' && '✅' || needs.create_cop_pr.result == 'skipped' && '⏭️' || '—' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Gate
        id: status
        if: always()
        run: |
          BASE="${{ needs.python_base.outputs.all_steps_passed == 'true' || needs.python_base.result == 'skipped' }}"
          TESTS="${{ needs.python_tests.outputs.all_tests_passed == 'true' || needs.python_tests.result == 'skipped' }}"

          if [[ "$BASE" == "true" && "$TESTS" == "true" ]]; then
            echo "all_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_passed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Some checks failed."
            exit 1
          fi
