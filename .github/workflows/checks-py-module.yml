---
name: Python Module Checks
on:
  workflow_call:
    inputs:
      concurrency_group:
        description: Name of concurrency group to manage concurrent github action runs
        default: ${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        required: false
        type: string
      runner_type:
        description: Type of runner (GitHub-hosted or self-hosted)
        required: false
        default: ubuntu-latest
        type: string
      commit_user:
        description: Username which should be used for commits by github action
        default: github-actions
        required: false
        type: string
      commit_email:
        description: Email which should be used for commits by github action
        default: noreply@github.com
        required: false
        type: string
      gh_wf_config_repo:
        description: Public repo where GitHub workflow config is stored
        default: acai-solutions/github-workflow-configs
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: Ref or branch of gh_wf_config_repo
        default: main
        required: false
        type: string
      linting_include:
        description: Whether to include Python code quality checks
        required: false
        default: true
        type: boolean
      linting_allow_failures:
        description: Whether to allow Python linting failures to pass the pipeline
        required: false
        default: false
        type: boolean
      python_version:
        description: Python version
        default: "3.11"
        required: false
        type: string
      python_lint_config_path:
        description: Path to python config in gh_wf_config_repo (e.g. "python")
        default: python
        required: false
        type: string
      testing_include:
        description: Whether to include pytest module tests
        required: false
        default: false
        type: boolean
      python_source_path:
        description: Relative path from repo root to the Python package root (where pyproject.toml lives)
        default: shared/python
        required: false
        type: string
      test_modules:
        description: >
          JSON array of module names whose _test/ folders should be exercised.
          Example: '["logging","storage","xml_parser"]'
        default: "[]"
        required: false
        type: string
      extra_pip_packages:
        description: Space-separated pip packages to install for tests
        default: ""
        required: false
        type: string
      autofix_include:
        description: "Whether to run Copilot autofix on _cop branch when checks fail"
        required: false
        default: false
        type: boolean
      copilot_fix_flake8:
        description: "Whether Copilot should attempt to fix flake8 findings"
        required: false
        default: true
        type: boolean
      copilot_fix_bandit:
        description: "Whether Copilot should attempt to fix bandit findings"
        required: false
        default: true
        type: boolean
      copilot_fix_tests:
        description: "Whether Copilot should attempt to fix failing tests"
        required: false
        default: false
        type: boolean
        
    outputs:
      all_steps_passed:
        description: Indicates if all pipeline steps passed successfully
        value: ${{ jobs.py_module_checks_summary.outputs.all_passed }}
      python_base_status:
        description: Python base pipeline status
        value: ${{ jobs.python_base.outputs.all_steps_passed }}
      python_tests_status:
        description: Python tests pipeline status
        value: ${{ jobs.python_tests.outputs.all_tests_passed }}
      autofix_applied:
        description: Whether Copilot autofix was applied
        value: ${{ jobs.python_ai_autofix.outputs.fixes_applied }}
      cop_branch:
        description: Name of the _cop branch used for fixes
        value: ${{ jobs.python_ai_autofix.outputs.cop_branch }}

concurrency:
  group: ${{ format('{0}:{1}', inputs.concurrency_group, github.workflow) }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  python_base:
    if: ${{ always() }}
    uses: acai-solutions/github-workflows/.github/workflows/python-base.yml@main
    with:
      concurrency_group: ${{ inputs.concurrency_group }}
      runner_type: ${{ inputs.runner_type }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
      gh_wf_config_repo: ${{ inputs.gh_wf_config_repo }}
      gh_wf_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      linting_include: ${{ inputs.linting_include }}
      linting_allow_failures: ${{ inputs.linting_allow_failures }}
      python_version: ${{ inputs.python_version }}
      python_config_path: ${{ inputs.python_lint_config_path }}
    secrets: inherit

  python_tests:
    if: ${{ inputs.testing_include && inputs.test_modules != '[]' }}
    uses: acai-solutions/github-workflows/.github/workflows/python-test.yml@py_test
    with:
      runner_type: ${{ inputs.runner_type }}
      python_version: ${{ inputs.python_version }}
      python_source_path: ${{ inputs.python_source_path }}
      test_modules: ${{ inputs.test_modules }}
      extra_pip_packages: ${{ inputs.extra_pip_packages }}
    secrets: inherit

  # ── Optional: Copilot Autofix on _cop branch (only on failure) ──────
  python_ai_autofix:
    needs:
      - python_base
      - python_tests
    if: |
      always() &&
      inputs.autofix_include &&
      (needs.python_base.outputs.all_steps_passed != 'true' || needs.python_tests.outputs.all_tests_passed != 'true') &&
      !(needs.python_base.result == 'skipped' && needs.python_tests.result == 'skipped')
    uses: acai-solutions/github-workflows/.github/workflows/python-ai-autofix.yml@py_test
    with:
      runner_type: ${{ inputs.runner_type }}
      fix_python: true
      python_version: ${{ inputs.python_version }}
      python_source_path: ${{ inputs.python_source_path }}
      copilot_fix_flake8: ${{ inputs.copilot_fix_flake8 }}
      copilot_fix_bandit: ${{ inputs.copilot_fix_bandit }}
      copilot_fix_tests: ${{ inputs.copilot_fix_tests }}
      test_modules: ${{ inputs.test_modules }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
      extra_pip_packages: ${{ inputs.extra_pip_packages }}
      gh_wf_config_repo: ${{ inputs.gh_wf_config_repo }}
      gh_wf_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      python_config_path: ${{ inputs.python_lint_config_path }}
    secrets: inherit

  # ── Create PR from _cop → feature when checks pass on _cop ─────────
  create_cop_pr:
    needs:
      - python_base
      - python_tests
    runs-on: ${{ inputs.runner_type }}
    if: |
      always() &&
      inputs.autofix_include &&
      endsWith(github.ref_name, '_cop') &&
      (needs.python_base.outputs.all_steps_passed == 'true' || needs.python_base.result == 'skipped') &&
      (needs.python_tests.outputs.all_tests_passed == 'true' || needs.python_tests.result == 'skipped')
    steps:
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

      - name: "Create PR: _cop → feature branch"
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const copBranch = context.ref.replace('refs/heads/', '');
            const featureBranch = copBranch.replace(/_cop$/, '');

            core.info(`_cop branch: ${copBranch}`);
            core.info(`Feature branch: ${featureBranch}`);

            // Check if PR already exists
            const { data: existingPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${copBranch}`,
              base: featureBranch,
              state: 'open',
            });

            if (existingPrs.length > 0) {
              const pr = existingPrs[0];
              core.info(`PR already exists: ${pr.html_url}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '✅ **Alle Checks bestanden** auf `' + copBranch + '`.',
                  '',
                  'Dieser PR ist bereit zum Review und Merge.',
                ].join('\n'),
              });
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `fix: Copilot Auto-Fixes für \`${featureBranch}\``,
                head: copBranch,
                base: featureBranch,
                body: [
                  '## 🤖 Copilot Auto-Fix PR',
                  '',
                  `Automatische Code-Korrekturen für Branch \`${featureBranch}\`.`,
                  `Alle Checks sind bestanden auf \`${copBranch}\`.`,
                  '',
                  '**Bitte Review durchführen und bei Zufriedenheit mergen.**',
                  '',
                  '---',
                  '_Erstellt durch die Copilot Autofix CI-Pipeline._',
                ].join('\n'),
              });

              core.info(`PR created: ${pr.html_url}`);
            }

  py_module_checks_summary:
    needs:
      - python_base
      - python_tests
      - python_ai_autofix
      - create_cop_pr
    runs-on: ${{ inputs.runner_type }}
    if: always()
    outputs:
      all_passed: ${{ steps.status.outputs.all_passed }}
    steps:
      - name: Generate Overall Summary
        run: |
          echo '# 📊 Python Module Checks - Overall Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '## Pipeline Results' >> $GITHUB_STEP_SUMMARY
          echo '| Component | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----------|--------|' >> $GITHUB_STEP_SUMMARY
          echo "| 🐍 Python Base (Quality) | ${{ needs.python_base.outputs.all_steps_passed == 'true' && '✅ Passed' || needs.python_base.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Python Tests | ${{ needs.python_tests.outputs.all_tests_passed == 'true' && '✅ Passed' || needs.python_tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 Copilot Autofix | ${{ needs.python_ai_autofix.outputs.fixes_applied == 'true' && '✅ Fixes applied' || needs.python_ai_autofix.result == 'skipped' && '⏭️ Skipped' || '⚠️ No fixes' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 _cop PR | ${{ needs.create_cop_pr.result == 'success' && '✅ PR erstellt' || needs.create_cop_pr.result == 'skipped' && '⏭️ Skipped' || '⚠️ Fehler' }} |" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

          PY_BASE_PASSED="${{ needs.python_base.outputs.all_steps_passed == 'true' || needs.python_base.result == 'skipped' }}"
          PY_TESTS_PASSED="${{ needs.python_tests.outputs.all_tests_passed == 'true' || needs.python_tests.result == 'skipped' }}"

          if [[ "$PY_BASE_PASSED" == "true" && "$PY_TESTS_PASSED" == "true" ]]; then
            echo "**🎉 Overall Result: ✅ All checks passed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**⚠️ Overall Result: ❌ Some checks failed. Please review the detailed results above.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failed Components:" >> $GITHUB_STEP_SUMMARY
            if [[ "$PY_BASE_PASSED" != "true" ]]; then
              echo "- Python Base (Quality)" >> $GITHUB_STEP_SUMMARY
            fi
            if [[ "$PY_TESTS_PASSED" != "true" ]]; then
              echo "- Python Tests" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Check Overall Status
        id: status
        if: always()
        run: |
          PY_BASE_PASSED="${{ needs.python_base.outputs.all_steps_passed == 'true' || needs.python_base.result == 'skipped' }}"
          PY_TESTS_PASSED="${{ needs.python_tests.outputs.all_tests_passed == 'true' || needs.python_tests.result == 'skipped' }}"

          if [[ "$PY_BASE_PASSED" == "true" && "$PY_TESTS_PASSED" == "true" ]]; then
            echo "all_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_passed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Some checks failed. See summary above for details."
            exit 1
          fi