name: Terraform AI Autofix (Claude Code)

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: Auto-fixes Terraform findings on a dedicated _ai branch.
#
# Fix pipeline (sequential, each tool gets its own Claude session):
#   1. terraform fmt   — deterministic, no AI needed
#   2. TFLint          — Claude Code fixes code-quality findings
#   3. Trivy           — Claude Code fixes security findings
#   4. Checkov         — Claude Code fixes compliance findings
#   5. Terratest       — Claude Code fixes Go test / Terraform example failures
#
# Branch Strategy (_ai):
#   feature branch fails → _ai created → fixes applied → push triggers CI
#   _ai fails again     → next iteration → more fixes → CI re-runs
#   _ai passes          → caller creates PR (_ai → feature)
#   max iterations hit   → stops (no infinite loop)
#
# Prerequisites:
#   - GH_RELEASE_APP_ID + GH_RELEASE_APP_PRIVATE_KEY secrets
#   - ANTHROPIC_API_KEY secret (for Claude Code sessions)
#   - AWS_TESTBED_OIDC_ROLE_ARN secret (only when tf_ai_autofix_tests is enabled)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      tf_version:
        description: "Terraform version for formatting"
        default: "latest"
        required: false
        type: string
      gh_wf_config_repo:
        description: "Public repo where tflint config is stored"
        default: "acai-solutions/github-workflow-configs"
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: "Ref or branch of gh_wf_config_repo"
        default: "main"
        required: false
        type: string
      tf_lint_config_path:
        description: 'Path to tflint config in gh_wf_config_repo (e.g. "aws/.tflint.hcl")'
        default: ".tflint.hcl"
        required: false
        type: string
      tf_lint_version:
        description: "TFLint version to use"
        default: "latest"
        required: false
        type: string
      tf_trivy_version:
        description: "Trivy version to use"
        default: "latest"
        required: false
        type: string
      tf_ai_autofix_tflint:
        description: "Whether to fix TFLint findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_trivy:
        description: "Whether to fix Trivy findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_checkov:
        description: "Whether to fix Checkov findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_tests:
        description: "Whether to fix Terratest failures (Go test + Terraform examples)"
        required: false
        default: false
        type: boolean
      tf_terratest_path:
        description: "Path to terratest directory"
        default: "test/terratest"
        required: false
        type: string
      tf_terratest_examples_path:
        description: "Path to terratest examples directory"
        default: "examples"
        required: false
        type: string
      tf_ai_autofix_max_attempts:
        description: "Maximum number of Terraform autofix iterations on _ai branch"
        required: false
        default: 3
        type: number
      commit_user:
        description: "Username for autofix commits"
        default: "github-actions[bot]"
        required: false
        type: string
      commit_email:
        description: "Email for autofix commits"
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        required: false
        type: string

    secrets:
      GH_RELEASE_APP_ID:
        required: true
      GH_RELEASE_APP_PRIVATE_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false
      GH_REPO_READ_APP_ID:
        required: false
      GH_REPO_READ_APP_PRIVATE_KEY:
        required: false
      AWS_TESTBED_OIDC_ROLE_ARN:
        required: false

    outputs:
      fixes_applied:
        description: "Whether fixes were pushed to _ai branch"
        value: ${{ jobs.autofix.outputs.fixes_applied }}
      fix_summary:
        description: "Summary of applied fixes"
        value: ${{ jobs.autofix.outputs.fix_summary }}
      ai_branch:
        description: "Name of the _ai branch"
        value: ${{ jobs.guard.outputs.ai_branch }}
      feature_branch:
        description: "Name of the feature branch"
        value: ${{ jobs.guard.outputs.feature_branch }}
      iteration:
        description: "Current iteration count after this run"
        value: ${{ jobs.guard.outputs.iteration }}

defaults:
  run:
    shell: bash

jobs:
  # ── Guard: branch context + iteration limit ─────────────────────────────
  guard:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      is_ai_branch: ${{ steps.detect.outputs.is_ai_branch }}
      current_branch: ${{ steps.detect.outputs.current_branch }}
      ai_branch: ${{ steps.detect.outputs.ai_branch }}
      feature_branch: ${{ steps.detect.outputs.feature_branch }}
      iteration: ${{ steps.detect.outputs.iteration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Detect branch context
        id: detect
        run: |
          BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"

          if [[ "${BRANCH}" == *_ai ]]; then
            IS_ai=true
            FEATURE="${BRANCH%_ai}"
            COP="${BRANCH}"
          else
            IS_ai=false
            FEATURE="${BRANCH}"
            COP="${BRANCH}_ai"
          fi

          echo "current_branch=${BRANCH}"    >> "$GITHUB_OUTPUT"
          echo "is_ai_branch=${IS_ai}"     >> "$GITHUB_OUTPUT"
          echo "feature_branch=${FEATURE}"   >> "$GITHUB_OUTPUT"
          echo "ai_branch=${COP}"            >> "$GITHUB_OUTPUT"

          # Derive iteration count from scoped git tags (autofix/<cop>-iter-N)
          ITERATION=0
          if [[ "${IS_ai}" == "true" ]]; then
            git fetch origin --tags 2>/dev/null || true
            TAG_PREFIX="autofix/$(echo "${COP}" | tr '/' '-')-iter-"
            LATEST=$(git tag -l "${TAG_PREFIX}*" --sort=version:refname | tail -1)
            if [[ -n "${LATEST}" ]]; then
              ITERATION="${LATEST##*-iter-}"
            fi
          fi
          echo "iteration=${ITERATION}" >> "$GITHUB_OUTPUT"

          MAX=${{ inputs.tf_ai_autofix_max_attempts }}
          if [[ "${ITERATION}" -ge "${MAX}" ]]; then
            echo "🛑 Max iterations (${MAX}) reached — stopping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

          echo "📌 Branch: ${BRANCH} | Feature: ${FEATURE} | COP: ${COP}"
          echo "📌 Is _ai: ${IS_ai} | Iteration: ${ITERATION}/${MAX}"

  # ── Main autofix job ────────────────────────────────────────────────────
  autofix:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner_type }}
    permissions:
      pull-requests: write
      id-token: write
      contents: read
    outputs:
      fixes_applied: ${{ steps.set_outputs.outputs.fixes_applied }}
      fix_summary: ${{ steps.set_outputs.outputs.fix_summary }}
      next_iteration: ${{ steps.set_outputs.outputs.next_iteration }}

    steps:
      # ── Auth + Checkout ─────────────────────────────────────────────────
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.guard.outputs.current_branch }}
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      # ── Branch setup ────────────────────────────────────────────────────
      - name: Setup _ai branch
        run: |
          git config --local user.name  "${{ inputs.commit_user }}"
          git config --local user.email "${{ inputs.commit_email }}"

          if [[ "${{ needs.guard.outputs.is_ai_branch }}" == "true" ]]; then
            echo "🔄 Already on _ai branch"
          else
            COP="${{ needs.guard.outputs.ai_branch }}"
            git fetch origin
            if git ls-remote --exit-code --heads origin "${COP}" >/dev/null 2>&1; then
              git checkout -b "${COP}" "origin/${COP}"
              echo "🔄 Checked out existing _ai branch"
            else
              git checkout -b "${COP}"
              echo "🆕 Created _ai branch: ${COP}"
            fi
          fi
          echo "✅ Branch: $(git branch --show-current)"

      - name: Exclude CI artifacts from git
        run: |
          mkdir -p .git/info
          cat >> .git/info/exclude <<'EOF'
          node_modules/
          .terraform/
          *.tfstate
          *.tfstate.backup
          EOF

      # ── Download findings from upstream check jobs ──────────────────────
      - name: Download security findings
        id: dl_security
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: autofix-security-findings
          path: /tmp/autofix-findings

      - name: Download Terratest findings
        if: inputs.tf_ai_autofix_tests
        id: dl_terratest
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: autofix-terratest-*
          merge-multiple: true
          path: /tmp/autofix-findings

      # ══════════════════════════════════════════════════════════════════════
      # TERRAFORM FMT (deterministic — no AI needed)
      # ══════════════════════════════════════════════════════════════════════

      - name: Setup Terraform ${{ inputs.tf_version }}
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Apply terraform fmt
        id: tf_fmt
        run: |
          if terraform fmt -check -recursive >/dev/null 2>&1; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "✅ Formatting already correct"
          else
            terraform fmt -recursive
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "✅ terraform fmt applied"
          fi

      - name: Commit terraform fmt fixes
        id: commit_fmt
        run: |
          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No formatting changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "fix(fmt): terraform fmt auto-fix

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed terraform fmt fixes"

      # ══════════════════════════════════════════════════════════════════════
      # TFLINT
      # ══════════════════════════════════════════════════════════════════════

      - name: Set up TFLint
        if: inputs.tf_ai_autofix_tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: ${{ inputs.tf_lint_version }}

      - name: Fetch TFLint config
        if: inputs.tf_ai_autofix_tflint
        run: |
          if [[ -f ".tflint.hcl" ]]; then
            echo "✅ Using local .tflint.hcl"
          else
            RESP=$(curl -s -w "\n%{http_code}" -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ inputs.gh_wf_config_repo }}/contents/${{ inputs.tf_lint_config_path }}?ref=${{ inputs.gh_wf_config_repo_ref }}")
            CODE=$(echo "$RESP" | tail -n 1)
            BODY=$(echo "$RESP" | head -n -1)
            if [[ "$CODE" == "200" ]]; then
              echo "$BODY" > .tflint.hcl
              echo "✅ Downloaded .tflint.hcl"
            else
              echo "⚠️ No .tflint.hcl available (HTTP $CODE) — using default"
              cat > .tflint.hcl << 'EOF'
          plugin "terraform" {
            enabled = true
            preset  = "recommended"
          }
          EOF
            fi
          fi

      - name: Initialize TFLint
        if: inputs.tf_ai_autofix_tflint
        run: tflint --init

      - name: Run TFLint
        if: inputs.tf_ai_autofix_tflint
        id: run_tflint
        run: |
          # Use findings from upstream check job if available
          if [[ -f "/tmp/autofix-findings/tflint-findings.txt" ]] && [[ -s "/tmp/autofix-findings/tflint-findings.txt" ]]; then
            cp /tmp/autofix-findings/tflint-findings.txt /tmp/tflint-findings.txt
            echo "📦 Using TFLint findings from upstream check job"
          else
            echo "ℹ️ No upstream artifact — running TFLint scan"
            tflint --format compact --recursive > /tmp/tflint-findings.txt 2>&1 || true
          fi

          if [[ -s /tmp/tflint-findings.txt ]] && grep -qE "(Error|Warning)" /tmp/tflint-findings.txt; then
            COUNT=$(grep -cE "(Error|Warning)" /tmp/tflint-findings.txt || echo "0")
            echo "⚠️ ${COUNT} TFLint findings"
            cat /tmp/tflint-findings.txt
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No TFLint findings"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix TFLint findings"
        id: claude_tflint
        if: inputs.tf_ai_autofix_tflint && steps.run_tflint.outputs.has_findings == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix all TFLint findings listed in /tmp/tflint-findings.txt.

            Steps:
            1. Read /tmp/tflint-findings.txt to see every finding.
            2. For each finding, edit the Terraform source file to fix the issue.
            3. Re-run: tflint --format compact --recursive
            4. Iterate until TFLint is clean.

            Common fixes:
            - terraform_naming_convention → rename resources/variables/outputs to snake_case
            - terraform_documented_variables → add description to variable blocks
            - terraform_documented_outputs → add description to output blocks
            - terraform_unused_declarations → remove unused variables/locals
            - terraform_deprecated_interpolation → remove unnecessary "${...}" wrappers

            Rules:
            - Only edit .tf files.
            - Do NOT modify .tflint.hcl or any config file.
            - Do NOT add comments explaining your changes.
            - Do NOT commit anything — just edit files.
            - Preserve existing code structure and formatting.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-haiku-4-5-20251001
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: "⚠️ Warn: TFLint Claude session incomplete"
        if: always() && inputs.tf_ai_autofix_tflint && steps.run_tflint.outputs.has_findings == 'true' && steps.claude_tflint.outcome == 'failure'
        run: |
          echo "::warning::Claude TFLint session did not complete (max-turns or API error) — partial fixes may have been applied"
          echo "⚠️ **Claude TFLint session incomplete** — hit max-turns or API error. Partial fixes may have been committed." >> $GITHUB_STEP_SUMMARY

      - name: Commit TFLint fixes
        id: commit_tflint
        if: inputs.tf_ai_autofix_tflint
        run: |
          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No TFLint changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))
          git add -A
          git commit -m "fix(tflint): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed TFLint fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # TRIVY
      # ══════════════════════════════════════════════════════════════════════

      - name: Install Trivy
        if: inputs.tf_ai_autofix_trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: ${{ inputs.tf_trivy_version }}

      - name: Run Trivy
        if: inputs.tf_ai_autofix_trivy
        id: run_trivy
        run: |
          # Use findings from upstream check job if available
          if [[ -f "/tmp/autofix-findings/trivy-findings.txt" ]] && [[ -s "/tmp/autofix-findings/trivy-findings.txt" ]]; then
            cp /tmp/autofix-findings/trivy-findings.txt /tmp/trivy-findings.txt
            echo "📦 Using Trivy findings from upstream check job"
          else
            echo "ℹ️ No upstream artifact — running Trivy scan"
            trivy config . --severity HIGH,CRITICAL --timeout 10m \
              --skip-dirs examples,.terraform > /tmp/trivy-findings.txt 2>&1 || true
          fi

          if [[ -s /tmp/trivy-findings.txt ]] && grep -qE "^(HIGH|CRITICAL|MEDIUM)" /tmp/trivy-findings.txt; then
            COUNT=$(grep -cE "^(HIGH|CRITICAL|MEDIUM)" /tmp/trivy-findings.txt || echo "0")
            echo "⚠️ ${COUNT} Trivy findings"
            cat /tmp/trivy-findings.txt
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No Trivy findings"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix Trivy findings"
        id: claude_trivy
        if: inputs.tf_ai_autofix_trivy && steps.run_trivy.outputs.has_findings == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix all Trivy security findings listed in /tmp/trivy-findings.txt.

            Steps:
            1. Read /tmp/trivy-findings.txt to see every finding.
            2. For each finding, edit the Terraform source file to fix the security issue.
            3. Re-run: trivy config . --severity HIGH,CRITICAL --timeout 10m --skip-dirs examples,.terraform
            4. Iterate until Trivy is clean.

            Common fixes:
            - Missing encryption at rest → add encryption configuration blocks
            - Missing encryption in transit → enable TLS / HTTPS settings
            - Overly permissive security groups → restrict CIDR blocks
            - Missing logging/monitoring → add logging configuration
            - Public access enabled → set public_access to false
            - Missing tags → add required tags

            Rules:
            - Only edit .tf files.
            - Do NOT modify any config or lock files.
            - Do NOT add comments explaining your changes.
            - Do NOT commit anything — just edit files.
            - Preserve existing code structure and formatting.
            - Ensure changes don't break existing resource references.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-haiku-4-5-20251001
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: "⚠️ Warn: Trivy Claude session incomplete"
        if: always() && inputs.tf_ai_autofix_trivy && steps.run_trivy.outputs.has_findings == 'true' && steps.claude_trivy.outcome == 'failure'
        run: |
          echo "::warning::Claude Trivy session did not complete (max-turns or API error) — partial fixes may have been applied"
          echo "⚠️ **Claude Trivy session incomplete** — hit max-turns or API error. Partial fixes may have been committed." >> $GITHUB_STEP_SUMMARY

      - name: Commit Trivy fixes
        id: commit_trivy
        if: inputs.tf_ai_autofix_trivy
        run: |
          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No Trivy changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))
          git add -A
          git commit -m "fix(trivy): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed Trivy fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # CHECKOV
      # ══════════════════════════════════════════════════════════════════════

      - name: Set up Python
        if: inputs.tf_ai_autofix_checkov
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Checkov
        if: inputs.tf_ai_autofix_checkov
        run: pip install checkov

      - name: Run Checkov
        if: inputs.tf_ai_autofix_checkov
        id: run_checkov
        run: |
          # Use findings from upstream check job if available
          if [[ -f "/tmp/autofix-findings/checkov-findings.txt" ]] && [[ -s "/tmp/autofix-findings/checkov-findings.txt" ]]; then
            cp /tmp/autofix-findings/checkov-findings.txt /tmp/checkov-findings.txt
            echo "📦 Using Checkov findings from upstream check job"
          else
            echo "ℹ️ No upstream artifact — running Checkov scan"
            checkov -d . --framework terraform --compact --quiet \
              > /tmp/checkov-findings.txt 2>&1 || true
          fi

          if [[ -s /tmp/checkov-findings.txt ]] && grep -q "FAILED" /tmp/checkov-findings.txt; then
            COUNT=$(grep -c "FAILED for resource" /tmp/checkov-findings.txt || echo "0")
            echo "⚠️ ${COUNT} Checkov findings"
            cat /tmp/checkov-findings.txt
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No Checkov findings"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix Checkov findings"
        id: claude_checkov
        if: inputs.tf_ai_autofix_checkov && steps.run_checkov.outputs.has_findings == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix all Checkov compliance findings listed in /tmp/checkov-findings.txt.

            Steps:
            1. Read /tmp/checkov-findings.txt to see every finding.
            2. For each finding, edit the Terraform source file to fix the compliance issue.
            3. Re-run: checkov -d . --framework terraform --compact --quiet
            4. Iterate until Checkov is clean.

            Common fixes:
            - CKV_TF_1 (module sources use commit hash) → resolve the git tag/version
              to its full commit SHA and replace `?ref=<version>` with `?ref=<commit-sha>`.
              Use `git ls-remote` to resolve: e.g.
              git ls-remote https://github.com/<org>/<repo>.git refs/tags/<version>
              Then use the full 40-char SHA in the source URL.
            - CKV_TF_2 (module source uses tag) → same as CKV_TF_1, pin to commit hash.
            - CKV_AWS_* (AWS best practices) → add the missing security configuration
              (encryption, logging, access controls, etc.).
            - CKV2_AWS_* (AWS complex checks) → implement the required multi-resource
              security patterns.

            Rules:
            - Only edit .tf files.
            - Do NOT modify any config or lock files.
            - Do NOT add comments explaining your changes.
            - Do NOT commit anything — just edit files.
            - Preserve existing code structure and formatting.
            - Ensure changes don't break existing resource references.
            - When resolving commit hashes, always verify with git ls-remote.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 20
            --model claude-haiku-4-5-20251001
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: "⚠️ Warn: Checkov Claude session incomplete"
        if: always() && inputs.tf_ai_autofix_checkov && steps.run_checkov.outputs.has_findings == 'true' && steps.claude_checkov.outcome == 'failure'
        run: |
          echo "::warning::Claude Checkov session did not complete (max-turns or API error) — partial fixes may have been applied"
          echo "⚠️ **Claude Checkov session incomplete** — hit max-turns or API error. Partial fixes may have been committed." >> $GITHUB_STEP_SUMMARY

      - name: Commit Checkov fixes
        id: commit_checkov
        if: inputs.tf_ai_autofix_checkov
        run: |
          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No Checkov changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))
          git add -A
          git commit -m "fix(checkov): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed Checkov fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # TERRATEST
      # ══════════════════════════════════════════════════════════════════════

      - name: Setup Go
        if: inputs.tf_ai_autofix_tests
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Configure Git for module access
        if: inputs.tf_ai_autofix_tests
        run: |
          git config --global url."https://x-access-token:${{ steps.app_token.outputs.token }}@github.com/".insteadOf https://github.com/

      - name: Configure AWS Credentials via OIDC
        if: inputs.tf_ai_autofix_tests
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_TESTBED_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_TESTBED_AWS_REGION }}

      - name: Prepare Terratest environment
        if: inputs.tf_ai_autofix_tests
        run: |
          # Write testbed tfvars if available
          if [[ -n "${{ vars.AWS_TESTBED_TFVARS }}" ]]; then
            echo "${{ vars.AWS_TESTBED_TFVARS }}" > ${{ inputs.tf_terratest_path }}/testbed.tfvar
            echo "✅ Testbed tfvars written"
          fi

          # Write backend config if available
          if [[ -n "${{ vars.AWS_TESTBED_BACKEND_JSON }}" ]]; then
            echo "${{ vars.AWS_TESTBED_BACKEND_JSON }}" > ${{ inputs.tf_terratest_path }}/backend.json
            echo "✅ Backend config written"
          fi

          # Ensure Go dependencies are ready
          cd ${{ inputs.tf_terratest_path }}
          go mod init test/terratest 2>/dev/null || true
          go get github.com/gruntwork-io/terratest/modules/terraform@v0.40.8
          go get github.com/stretchr/testify/assert@latest
          go mod tidy

      - name: Run Terratest
        if: inputs.tf_ai_autofix_tests
        id: run_terratest
        run: |
          # Use findings from upstream check job if available
          if [[ -f "/tmp/autofix-findings/terratest-output.txt" ]] && [[ -s "/tmp/autofix-findings/terratest-output.txt" ]]; then
            cp /tmp/autofix-findings/terratest-output.txt /tmp/terratest-output.txt
            echo "📦 Using Terratest output from upstream check job"
          else
            echo "ℹ️ No upstream Terratest artifact — tests were skipped or not run"
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -qE "^FAIL" /tmp/terratest-output.txt; then
            COUNT=$(grep -cE "--- FAIL" /tmp/terratest-output.txt || echo "0")
            echo "⚠️ ${COUNT} Terratest failures"
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "✅ All Terratest tests passed or were skipped — no autofix needed"
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: "🤖 Claude: Fix Terratest failures"
        id: claude_terratest
        if: inputs.tf_ai_autofix_tests && steps.run_terratest.outputs.has_failures == 'true'
        timeout-minutes: 15
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Fix the Terratest failures listed in /tmp/terratest-output.txt.

            Test directory: ${{ inputs.tf_terratest_path }}
            Examples directory: ${{ inputs.tf_terratest_examples_path }}

            Steps:
            1. Read /tmp/terratest-output.txt to identify every failure and its root cause.
            2. Inspect the Go test files in ${{ inputs.tf_terratest_path }}/ and the
               Terraform example configs in ${{ inputs.tf_terratest_examples_path }}/.
            3. Fix the root cause — this may be:
               - Terraform code issues in examples/ (.tf files)
               - Go test code issues in test/terratest/ (_test.go files)
               - Missing or incorrect variable/output definitions
               - Resource configuration errors
            4. Re-run: cd ${{ inputs.tf_terratest_path }} && go test -v -timeout 10m
            5. Iterate until all tests pass (max 2 re-runs to avoid long execution).

            Common fixes:
            - "Error: Reference to undeclared ..." → add missing variable/local/data block
            - "Error: Unsupported argument" → remove or rename incorrect arguments
            - "Error: Missing required argument" → add the required argument
            - Test assertion failures → fix the Terraform config so outputs match expectations
            - Provider errors → fix provider configuration in examples


            ✋ TEST-BED INTEGRATION CONSTRAINTS (MANDATORY):
            The following files in ${{ inputs.tf_terratest_examples_path }}/** are part of test-bed integration
            and MUST NOT be modified:
              - backend.tf       (injected during CI)
              - variables.tf     (injected during CI)
              - provider.tf      (injected during CI)
            
            Do NOT add or provide backend.tf or *.tfvars files in ${{ inputs.tf_terratest_path }}/** — they are
            injected by the GitHub Actions workflow and will conflict if pre-committed.

            Rules:
            - Edit .tf files in ${{ inputs.tf_terratest_examples_path }}/** (except protected test-bed files) and .go files in ${{ inputs.tf_terratest_path }}/**.
            - UPDATE go.mod and go.sum as needed to fix vulnerabilities or resolve test failures (run "go mod tidy" after changes).
            - Do NOT modify backend.tf, variables.tf, or provider.tf in examples/ (test-bed managed).
            - Do NOT commit .tfvars files (test-bed injected during CI).
            - Do NOT add comments explaining your changes.
            - Do NOT commit anything — just edit files.
            - Do NOT weaken or remove test assertions.
            - Preserve existing code structure and formatting.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app_token.outputs.token }}
          claude_args: >
            --max-turns 25
            --model claude-sonnet-4-6
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash
          track_progress: false
          show_full_output: true

      - name: "⚠️ Warn: Terratest Claude session incomplete"
        if: always() && inputs.tf_ai_autofix_tests && steps.run_terratest.outputs.has_failures == 'true' && steps.claude_terratest.outcome == 'failure'
        run: |
          echo "::warning::Claude Terratest session did not complete (max-turns or API error) — partial fixes may have been applied"
          echo "⚠️ **Claude Terratest session incomplete** — hit max-turns or API error. Partial fixes may have been committed." >> $GITHUB_STEP_SUMMARY

      - name: Commit Terratest fixes
        id: commit_terratest
        if: inputs.tf_ai_autofix_tests
        run: |
          if [[ -z "$(git status -s)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No Terratest changes to commit"
            exit 0
          fi

          COUNT=$(git status -s | wc -l | tr -d ' ')
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))
          git add -A
          git commit -m "fix(terratest): Claude Code autofix (${COUNT} files, iteration ${NEXT})

          copilot-autofix: true"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "📝 Committed Terratest fixes: ${COUNT} files"

      # ══════════════════════════════════════════════════════════════════════
      # PUSH + SUMMARY
      # ══════════════════════════════════════════════════════════════════════

      - name: Aggregate outputs
        id: set_outputs
        run: |
          FMT="${{ steps.commit_fmt.outputs.committed }}"
          LINT="${{ steps.commit_tflint.outputs.committed }}"
          TRIVY="${{ steps.commit_trivy.outputs.committed }}"
          CHECKOV="${{ steps.commit_checkov.outputs.committed }}"
          TESTS="${{ steps.commit_terratest.outputs.committed }}"

          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))
          echo "next_iteration=${NEXT}" >> "$GITHUB_OUTPUT"

          if [[ "${FMT}" == "true" || "${LINT}" == "true" || "${TRIVY}" == "true" || "${CHECKOV}" == "true" || "${TESTS}" == "true" ]]; then
            echo "fixes_applied=true" >> "$GITHUB_OUTPUT"
            PARTS=()
            [[ "${FMT}" == "true" ]]     && PARTS+=("fmt")
            [[ "${LINT}" == "true" ]]    && PARTS+=("tflint")
            [[ "${TRIVY}" == "true" ]]   && PARTS+=("trivy")
            [[ "${CHECKOV}" == "true" ]] && PARTS+=("checkov")
            [[ "${TESTS}" == "true" ]]   && PARTS+=("terratest")
            printf -v SUMMARY '%s,' "${PARTS[@]}"
            echo "fix_summary=${SUMMARY%,}" >> "$GITHUB_OUTPUT"
          else
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
            echo "fix_summary=No fixes needed" >> "$GITHUB_OUTPUT"
          fi

      - name: Push _ai branch
        if: steps.set_outputs.outputs.fixes_applied == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          COP="${{ needs.guard.outputs.ai_branch }}"
          ITER="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITER + 1))
          TAG="autofix/$(echo "${COP}" | tr '/' '-')-iter-${NEXT}"

          git remote set-url origin \
            "https://x-access-token:${GH_APP_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${COP}"
          git tag -f "${TAG}"
          git push origin "${TAG}" --force
          echo "✅ Pushed ${COP} — tagged ${TAG}"

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo '# 🔧 Terraform AI Autofix (Claude Code)' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| _ai branch | \`${{ needs.guard.outputs.ai_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Feature branch | \`${{ needs.guard.outputs.feature_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Iteration | ${{ needs.guard.outputs.iteration }} / ${{ inputs.tf_ai_autofix_max_attempts }} |" >> $GITHUB_STEP_SUMMARY
          echo "| terraform fmt | ${{ steps.commit_fmt.outputs.committed == 'true' && '✅ Applied' || '⏭️ Clean' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TFLint | ${{ inputs.tf_ai_autofix_tflint && '✅' || '⏭️' }} — committed: ${{ steps.commit_tflint.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ inputs.tf_ai_autofix_trivy && '✅' || '⏭️' }} — committed: ${{ steps.commit_trivy.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov | ${{ inputs.tf_ai_autofix_checkov && '✅' || '⏭️' }} — committed: ${{ steps.commit_checkov.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terratest | ${{ inputs.tf_ai_autofix_tests && '✅' || '⏭️' }} — committed: ${{ steps.commit_terratest.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fixes applied | ${{ steps.set_outputs.outputs.fixes_applied || 'false' }} |" >> $GITHUB_STEP_SUMMARY

  # ── Create PR: _ai → feature ──────────────────────────────────────────
  create_ai_pr:
    needs: [guard, autofix]
    if: always() && needs.guard.outputs.should_run == 'true'
    uses: ./.github/workflows/ai-autofix-create-ai-pr.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      app_id: GH_RELEASE_APP_ID
      app_private_key: GH_RELEASE_APP_PRIVATE_KEY
      ai_branch: ${{ needs.guard.outputs.ai_branch }}
      feature_branch: ${{ needs.guard.outputs.feature_branch }}
      pr_title: "fix: Terraform autofix für `${{ needs.guard.outputs.feature_branch }}` (iteration ${{ needs.autofix.outputs.next_iteration }})"
      pr_body: |
        ## 🤖 Terraform AI Autofix (Claude Code)

        Automated fixes applied by Claude Code on `${{ needs.guard.outputs.ai_branch }}` → `${{ needs.guard.outputs.feature_branch }}`.

        **Fix summary:** ${{ needs.autofix.outputs.fix_summary }}

        > Review and merge when CI passes on this branch.
      pr_ready_comment: |
        ✅ **All checks passed** on `${{ needs.guard.outputs.ai_branch }}`.

        This PR is ready for review and merge.
    secrets: inherit
