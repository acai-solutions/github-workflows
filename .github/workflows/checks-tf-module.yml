---
name: Terraform Module Checks
on:
  workflow_call:
    inputs:
      concurrency_group:
        description: Name of concurrency group to manage concurrent github action runs
        default: ${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        required: false
        type: string
      runner_type:
        description: Type of runner (GitHub-hosted or self-hosted)
        required: false
        default: ubuntu-latest
        type: string
      commit_user:
        description: Username which should be used for commits by github action
        default: github-actions
        required: false
        type: string
      commit_email:
        description: Email which should be used for commits by github action
        default: noreply@github.com
        required: false
        type: string

      # GitHub Workflow Config Repo
      gh_wf_config_repo:
        description: Public repo where GitHub workflow config is stored
        default: acai-solutions/github-workflow-configs
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: Ref or branch of gh_wf_config_repo
        default: main
        required: false
        type: string

      # Linting inputs


      # Terraform inputs
      tf_version:
        description: Terraform version used for formatting and docs
        default: latest
        required: false
        type: string
      tf_docs_skip:
        description: "Skip Terraform docs generation"
        required: false
        default: false
        type: boolean
      tf_lint_include:
        description: Whether to include TFLint code quality checks
        required: false
        default: true
        type: boolean
      tf_lint_config_path:
        description: Path to tflint config in gh_wf_config_repo (e.g. "aws/.tflint.hcl")
        default: .tflint.hcl
        required: false
        type: string
      tf_lint_version:
        description: Tflint version to use
        default: latest
        required: false
        type: string
      tf_lint_allow_failures:
        description: Whether to allow TFLint failures to pass the pipeline
        required: false
        default: false
        type: boolean
      tf_trivy_version:
        description: Trivy version to use
        default: latest
        required: false
        type: string
      tf_checkov_failures_allow:
        description: Whether to abort the workflow if Checkov checks fail
        required: false
        default: false
        type: boolean

      # Test inputs
      tf_terratest_run_tests:
        description: Whether to run Terraform (Terratest) tests
        required: false
        default: true
        type: boolean
      tf_test_beds:
        description: "List of test beds to run tests against (JSON array, e.g. [\"AWS\"])"
        required: false
        default: '["AWS"]'
        type: string
      tf_test_bed_aws_terratest_config:
        description: 'Path to AWS terratest matrix json config'
        default: "aws/matrix_tf1x5x7_aws5x80x0.json"
        required: false
        type: string
      tf_test_bed_aws_esc_terratest_config:
        description: 'Path to AWS-ESC terratest matrix json config'
        default: "aws/matrix_tf1x14x0_aws6x29x0.json"
        required: false
        type: string
      tf_terratest_path:
        description: "Path to terratest directory"
        default: "test/terratest"
        required: false
        type: string
      tf_terratest_examples_path:
        description: "Path to terratest examples directory"
        default: "examples"
        required: false
        type: string

      # ── AI Autofix (optional) ───────────────────────────────────────────
      tf_ai_autofix_include:
        description: "Whether to run Terraform AI autofix on _cop branch when checks fail"
        required: false
        default: false
        type: boolean
      tf_ai_autofix_tflint:
        description: "Whether to fix TFLint findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_trivy:
        description: "Whether to fix Trivy findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_checkov:
        description: "Whether to fix Checkov findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_tests:
        description: "Whether to fix Terratest failures (Go test + Terraform examples)"
        required: false
        default: false
        type: boolean
      tf_ai_autofix_max_attempts:
        description: "Maximum number of Terraform autofix iterations on _cop branch"
        required: false
        default: 3
        type: number

    outputs:
      all_checks_passed:
        description: Indicates if all pipeline steps passed successfully
        value: ${{ jobs.terraform_base.outputs.all_checks_passed == 'true' &&
          jobs.terraform_security.outputs.all_checks_passed == 'true' &&
          (inputs.tf_terratest_run_tests != true || jobs.terraform_module_test.outputs.all_checks_passed == 'true') }}
      terraform_base_status:
        description: Terraform base pipeline status
        value: ${{ jobs.terraform_base.outputs.all_checks_passed }}
      security_status:
        description: Security checks status
        value: ${{ jobs.terraform_security.outputs.all_checks_passed }}
      autofix_applied:
        description: Whether terraform-ai-autofix was applied
        value: ${{ jobs.terraform_ai_autofix.outputs.fixes_applied }}
      ai_branch:
        description: Name of the _cop branch used for fixes
        value: ${{ jobs.terraform_ai_autofix.outputs.ai_branch }}

concurrency:
  group: ${{ format('{0}:{1}', inputs.concurrency_group, github.workflow) }}
  cancel-in-progress: true

jobs:
  # ── Base: format + docs ─────────────────────────────────────────────
  terraform_base:
    if: ${{ always() }}
    uses: ./.github/workflows/tf-base.yml
    with:
      concurrency_group: ${{ inputs.concurrency_group }}
      runner_type: ${{ inputs.runner_type }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
      tf_version: ${{ inputs.tf_version }}
      tf_docs_skip: ${{ inputs.tf_docs_skip }}

  # ── Security: TFLint + Trivy + Checkov ──────────────────────────────
  terraform_security:
    needs: terraform_base
    if: ${{ needs.terraform_base.result == 'success' }}
    uses: ./.github/workflows/tf-security.yml
    with:
      concurrency_group: ${{ inputs.concurrency_group }}
      runner_type: ${{ inputs.runner_type }}
      gh_wf_config_repo: ${{ inputs.gh_wf_config_repo }}
      gh_wf_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      tf_lint_include: ${{ inputs.tf_lint_include }}
      tf_lint_config_path: ${{ inputs.tf_lint_config_path }}
      tf_lint_version: ${{ inputs.tf_lint_version }}
      tf_lint_allow_failures: ${{ inputs.tf_lint_allow_failures }}
      tf_trivy_version: ${{ inputs.tf_trivy_version }}
      tf_checkov_failures_allow: ${{ inputs.tf_checkov_failures_allow }}

  # ── Terratest ───────────────────────────────────────────────────────
  terraform_module_test:
    needs: terraform_security
    if: ${{ inputs.tf_terratest_run_tests && needs.terraform_security.outputs.all_checks_passed == 'true' }}
    uses: ./.github/workflows/tf-module-test.yml
    with:
      tf_version: ${{ inputs.tf_version }}
      tf_terratest_config_repo: ${{ inputs.gh_wf_config_repo }}
      tf_terratest_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      tf_terratest_path: ${{ inputs.tf_terratest_path }}
      tf_terratest_examples_path: ${{ inputs.tf_terratest_examples_path }}
      tf_test_beds: ${{ inputs.tf_test_beds }}
      tf_test_bed_aws_terratest_config: ${{ inputs.tf_test_bed_aws_terratest_config }}
      tf_test_bed_aws_esc_terratest_config: ${{ inputs.tf_test_bed_aws_esc_terratest_config }}
    secrets: inherit

  # ── AI Autofix on _cop branch (only when checks fail) ───────────────
  terraform_ai_autofix:
    needs:
      - terraform_base
      - terraform_security
      - terraform_module_test
    if: |
      always() &&
      inputs.tf_ai_autofix_include &&
      (needs.terraform_base.outputs.all_checks_passed != 'true' ||
       needs.terraform_security.outputs.all_checks_passed != 'true' ||
       (needs.terraform_module_test.result != 'skipped' &&
        needs.terraform_module_test.outputs.all_checks_passed != 'true')) &&
      !(needs.terraform_base.result == 'skipped' &&
        needs.terraform_security.result == 'skipped' &&
        needs.terraform_module_test.result == 'skipped')
    uses: ./.github/workflows/ai-autofix-terraform.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      tf_version: ${{ inputs.tf_version }}
      gh_wf_config_repo: ${{ inputs.gh_wf_config_repo }}
      gh_wf_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      tf_lint_config_path: ${{ inputs.tf_lint_config_path }}
      tf_lint_version: ${{ inputs.tf_lint_version }}
      tf_trivy_version: ${{ inputs.tf_trivy_version }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
      tf_ai_autofix_tflint: ${{ inputs.tf_ai_autofix_tflint }}
      tf_ai_autofix_trivy: ${{ inputs.tf_ai_autofix_trivy }}
      tf_ai_autofix_checkov: ${{ inputs.tf_ai_autofix_checkov }}
      tf_ai_autofix_tests: ${{ inputs.tf_ai_autofix_tests }}
      tf_terratest_path: ${{ inputs.tf_terratest_path }}
      tf_terratest_examples_path: ${{ inputs.tf_terratest_examples_path }}
      tf_ai_autofix_max_attempts: ${{ inputs.tf_ai_autofix_max_attempts }}
    secrets: inherit

  # ── Summary gate ────────────────────────────────────────────────────
  tf_module_checks_summary:
    needs:
      - terraform_base
      - terraform_security
      - terraform_module_test
      - terraform_ai_autofix
    runs-on: ${{ inputs.runner_type }}
    if: always()
    steps:
      - name: Summary
        run: |
          echo '# 📊 Terraform Module Checks' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Component | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----------|--------|' >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Base (Format & Docs) | ${{ needs.terraform_base.outputs.all_checks_passed == 'true' && '✅' || needs.terraform_base.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security | ${{ needs.terraform_security.outputs.all_checks_passed == 'true' && '✅' || needs.terraform_security.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.tf_terratest_run_tests }}" == "true" ]]; then
            echo "| 🧪 Terratest | ${{ needs.terraform_module_test.outputs.all_checks_passed == 'true' && '✅' || needs.terraform_module_test.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| 🤖 AI Autofix | ${{ needs.terraform_ai_autofix.outputs.fixes_applied == 'true' && '✅ Applied' || needs.terraform_ai_autofix.result == 'skipped' && '⏭️' || '—' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Gate
        if: always()
        run: |
          BASE="${{ needs.terraform_base.outputs.all_checks_passed == 'true' }}"
          SEC="${{ needs.terraform_security.outputs.all_checks_passed == 'true' }}"
          TEST="${{ inputs.tf_terratest_run_tests != true || needs.terraform_module_test.outputs.all_checks_passed == 'true' }}"

          if [[ "$BASE" != "true" || "$SEC" != "true" || "$TEST" != "true" ]]; then
            echo "::error::Some checks failed."
            exit 1
          fi

  # ── Create PR: _ai → feature (when _ai branch passes all checks) ───
  create_ai_pr_on_pass:
    needs:
      - terraform_base
      - terraform_security
      - terraform_module_test
    if: |
      always() &&
      inputs.tf_ai_autofix_include &&
      endsWith(github.head_ref || github.ref_name, '_ai') &&
      needs.terraform_base.outputs.all_checks_passed == 'true' &&
      needs.terraform_security.outputs.all_checks_passed == 'true' &&
      (inputs.tf_terratest_run_tests != true || needs.terraform_module_test.outputs.all_checks_passed == 'true')
    uses: ./.github/workflows/ai-autofix-create-ai-pr.yml
    with:
      runner_type: ${{ inputs.runner_type }}
      app_id: GH_RELEASE_APP_ID
      app_private_key: GH_RELEASE_APP_PRIVATE_KEY
      ai_branch: ${{ github.head_ref || github.ref_name }}
      pr_title: "fix: Terraform autofix for `${{ github.head_ref || github.ref_name }}`"
      pr_body: |
        ## 🤖 Terraform AI Autofix (Claude Code)

        All checks passed on `${{ github.head_ref || github.ref_name }}`.

        > Review and merge to apply fixes to the feature branch.
      pr_ready_comment: |
        ✅ **All checks passed** on `${{ github.head_ref || github.ref_name }}`.

        This PR is ready for review and merge.
    secrets: inherit
