---
name: Terraform Module Checks
on:
  workflow_call:
    inputs:
      concurrency_group:
        description: Name of concurrency group to manage concurrent github action runs
        default: ${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        required: false
        type: string
      runner_type:
        description: Type of runner (GitHub-hosted or self-hosted)
        required: false
        default: ubuntu-latest
        type: string
      commit_user:
        description: Username which should be used for commits by github action
        default: github-actions
        required: false
        type: string
      commit_email:
        description: Email which should be used for commits by github action
        default: noreply@github.com
        required: false
        type: string

      # GitHub Workflow Config Repo  
      gh_wf_config_repo:
        description: Public repo where GitHub workflow config is stored
        default: acai-solutions/github-workflow-configs
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: Ref or branch of gh_wf_config_repo
        default: main
        required: false
        type: string

      # Linting inputs
      linting_include:
        description: Whether to include TFLint code quality checks
        required: false
        default: true
        type: boolean
      linting_allow_failures:
        description: Whether to allow linting failures to pass the pipeline
        required: false
        default: false
        type: boolean

      # Python inputs
      python_version:
        description: Python version
        default: "3.11"
        required: false
        type: string

      # Terraform inputs
      tf_version:
        description: Terraform version used for formatting and docs
        default: latest
        required: false
        type: string
      tf_docs_skip:
        description: "Skip Terraform docs generation"
        required: false
        default: false
        type: boolean
      tf_lint_config_path:
        description: Path to tflint config in gh_wf_config_repo (e.g. "aws/.tflint.hcl")
        default: .tflint.hcl
        required: false
        type: string
      tf_lint_version:
        description: Tflint version to use
        default: latest
        required: false
        type: string
      tf_trivy_version:
        description: Trivy version to use
        default: latest
        required: false
        type: string
      tf_checkov_failures_allow:
        description: Whether to abort the workflow if Checkov checks fail
        required: false
        default: false
        type: boolean

      # Test inputs
      terratest_run_tests:
        description: Whether to run Terraform (Terratest) tests
        required: false
        default: true
        type: boolean
      test_beds: 
        description: "List of test beds to run tests against (JSON array of cloud provider prefixes, e.g. [\"AWS\"])"
        required: false
        default: '["AWS"]'
        type: string
      test_bed_aws_terratest_config:
        description: 'Path to AWS terratest matrix json config in terratest_config_repo/terraform/terratest/ (e.g. "aws/matrix.json")'
        default: "aws/matrix_tf1x5x7_aws5x80x0.json"
        required: false
        type: string
      test_bed_aws_esc_terratest_config:
        description: 'Path to AWS-ESC terratest matrix json config in terratest_config_repo/terraform/terratest/ (e.g. "aws-esc/matrix.json")'
        default: "aws/matrix_tf1x14x0_aws6x29x0.json"
        required: false
        type: string
      terratest_path:
        description: "Path to terratest directory"
        default: "test/terratest"
        required: false
        type: string
      terratest_examples_path:
        description: "Path to terratest examples directory"
        default: "examples"
        required: false
        type: string

      # Terraform AI Autofix inputs
      autofix_include:
        description: "Whether to run terraform-ai-autofix on _cop branch when checks fail"
        required: false
        default: false
        type: boolean
      max_copilot_attempts:
        description: "Maximum number of terraform-ai-autofix fix iterations on _cop branch"
        required: false
        default: 3
        type: number

    outputs:
      all_checks_passed:
        description: Indicates if all pipeline steps passed successfully
        value: ${{ jobs.terraform_base.outputs.all_checks_passed == 'true' &&
          jobs.terraform_security.outputs.all_checks_passed == 'true' &&
          (inputs.terratest_run_tests != true || jobs.terraform_module_test.outputs.all_checks_passed == 'true') }}
      terraform_base_status:
        description: Terraform base pipeline status
        value: ${{ jobs.terraform_base.outputs.all_checks_passed }}
      security_status:
        description: Security checks status
        value: ${{ jobs.terraform_security.outputs.all_checks_passed }}
      security_test_status:
        description: Security checks status
        value: ${{ jobs.terraform_security.outputs.all_checks_passed }}
      autofix_applied:
        description: Whether terraform-ai-autofix was applied
        value: ${{ jobs.terraform_ai_autofix.outputs.fixes_applied }}
      cop_branch:
        description: Name of the _cop branch used for fixes
        value: ${{ jobs.terraform_ai_autofix.outputs.cop_branch }}

# Replace scalar with object to namespace and optionally cancel prior runs
concurrency:
  group: ${{ format('{0}:{1}', inputs.concurrency_group, github.workflow) }}
  cancel-in-progress: true

jobs:
  terraform_base:
    if: ${{ always() }}
    uses: acai-solutions/github-workflows/.github/workflows/tf-base.yml@main
    with:
      concurrency_group: ${{ inputs.concurrency_group }}
      runner_type: ${{ inputs.runner_type }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
      tf_version: ${{ inputs.tf_version }}
      tf_docs_skip: ${{ inputs.tf_docs_skip }}

  terraform_security:
    needs:
      - terraform_base
    if: ${{ needs.terraform_base.result == 'success' }}
    uses: acai-solutions/github-workflows/.github/workflows/tf-security.yml@main
    with:
      concurrency_group: ${{ inputs.concurrency_group }}
      runner_type: ${{ inputs.runner_type }}
      gh_wf_config_repo: ${{ inputs.gh_wf_config_repo }}
      gh_wf_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      linting_include: ${{ inputs.linting_include }}
      linting_allow_failures: ${{ inputs.linting_allow_failures }}
      tf_lint_config_path: ${{ inputs.tf_lint_config_path }}
      tf_lint_version: ${{ inputs.tf_lint_version }}
      trivy_version: ${{ inputs.tf_trivy_version }}
      checkov_failures_allow: ${{ inputs.tf_checkov_failures_allow }}
    
  terraform_module_test:
    needs:
      - terraform_security
    uses: acai-solutions/github-workflows/.github/workflows/tf-module-test.yml@main
    if: ${{ inputs.terratest_run_tests && needs.terraform_security.outputs.all_checks_passed == 'true' }}
    with:
      terratest_config_repo: ${{ inputs.gh_wf_config_repo }}
      terratest_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      terratest_path: ${{ inputs.terratest_path }}
      terratest_examples_path: ${{ inputs.terratest_examples_path }}
      test_beds: ${{ inputs.test_beds }}
      test_bed_aws_terratest_config: ${{ inputs.test_bed_aws_terratest_config }}
      test_bed_aws_esc_terratest_config: ${{ inputs.test_bed_aws_esc_terratest_config }}
    secrets: inherit
      
  # ── Optional: Terraform AI Autofix on _cop branch (only on failure) ──────
  terraform_ai_autofix:
    needs:
      - terraform_base
      - terraform_security
      - terraform_module_test
    if: |
      always() &&
      inputs.autofix_include &&
      (needs.terraform_base.outputs.all_checks_passed != 'true' ||
       needs.terraform_security.outputs.all_checks_passed != 'true' ||
       (needs.terraform_module_test.result != 'skipped' && needs.terraform_module_test.outputs.all_checks_passed != 'true')) &&
      !(needs.terraform_base.result == 'skipped' && needs.terraform_security.result == 'skipped' && needs.terraform_module_test.result == 'skipped')
    uses: acai-solutions/github-workflows/.github/workflows/terraform-ai-autofix.yml@py_test
    with:
      runner_type: ${{ inputs.runner_type }}
      fix_terraform: true
      tf_version: ${{ inputs.tf_version }}
      max_copilot_attempts: ${{ inputs.max_copilot_attempts }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
    secrets: inherit

  # ── Create PR from _cop → feature when checks pass on _cop ─────────
  create_cop_pr:
    needs:
      - terraform_base
      - terraform_security
      - terraform_module_test
    runs-on: ${{ inputs.runner_type }}
    if: |
      always() &&
      inputs.autofix_include &&
      endsWith(github.ref_name, '_cop') &&
      needs.terraform_base.outputs.all_checks_passed == 'true' &&
      needs.terraform_security.outputs.all_checks_passed == 'true' &&
      (needs.terraform_module_test.result == 'skipped' || needs.terraform_module_test.outputs.all_checks_passed == 'true')
    steps:
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

      - name: "Create PR: _cop → feature branch"
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const copBranch = context.ref.replace('refs/heads/', '');
            const featureBranch = copBranch.replace(/_cop$/, '');

            core.info(`_cop branch: ${copBranch}`);
            core.info(`Feature branch: ${featureBranch}`);

            // Check if PR already exists
            const { data: existingPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${copBranch}`,
              base: featureBranch,
              state: 'open',
            });

            if (existingPrs.length > 0) {
              const pr = existingPrs[0];
              core.info(`PR already exists: ${pr.html_url}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '✅ **All checks passed** on `' + copBranch + '`.',
                  '',
                  'This PR is ready for review and merge.',
                ].join('\n'),
              });
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `fix: Copilot Auto-Fixes for \`${featureBranch}\``,
                head: copBranch,
                base: featureBranch,
                body: [
                  '## 🤖 Copilot Auto-Fix PR',
                  '',
                  `Automatic code fixes for branch \`${featureBranch}\`.`,
                  `All checks passed on \`${copBranch}\`.`,
                  '',
                  '**Please review and merge when satisfied.**',
                  '',
                  '---',
                  '_Created by the Copilot Autofix CI pipeline._',
                ].join('\n'),
              });

              core.info(`PR created: ${pr.html_url}`);
            }

  tf_module_checks_summary:
    needs:
      - terraform_base
      - terraform_security
      - terraform_module_test
      - copilot_autofix
      - create_cop_pr
    runs-on: ${{ inputs.runner_type }}
    if: always()
    steps:
      - name: Generate Overall Summary
        run: |
          echo '# 📊 Terraform Module Checks - Overall Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '## Pipeline Results' >> $GITHUB_STEP_SUMMARY
          echo '| Component | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----------|--------|' >> $GITHUB_STEP_SUMMARY

          echo "| 📝 Terraform Base (Format & Docs) | ${{ needs.terraform_base.outputs.all_checks_passed == 'true' && '✅ Passed' || needs.terraform_base.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Terraform Security Checks | ${{ needs.terraform_security.outputs.all_checks_passed == 'true' && '✅ Passed' || needs.terraform_security.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ inputs.terratest_run_tests }}" == "true" ]]; then
            echo "| 🧪 Terraform Tests | ${{ needs.terraform_module_test.outputs.all_checks_passed == 'true' && '✅ Passed' || needs.terraform_module_test.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| 🤖 terraform-ai-autofix | ${{ needs.terraform_ai_autofix.outputs.fixes_applied == 'true' && '✅ Fixes applied' || needs.terraform_ai_autofix.result == 'skipped' && '⏭️ Skipped' || '⚠️ No fixes' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 _cop PR | ${{ needs.create_cop_pr.result == 'success' && '✅ PR created' || needs.create_cop_pr.result == 'skipped' && '⏭️ Skipped' || '⚠️ Error' }} |" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

          TF_BASE_PASSED="${{ needs.terraform_base.outputs.all_checks_passed == 'true' }}"
          TF_SECURITY_PASSED="${{ needs.terraform_security.outputs.all_checks_passed == 'true' }}"
          TF_TESTS_PASSED="${{ inputs.terratest_run_tests != true || needs.terraform_module_test.outputs.all_checks_passed == 'true' }}"

          if [[ "$TF_BASE_PASSED" == "true" && "$TF_SECURITY_PASSED" == "true" && "$TF_TESTS_PASSED" == "true" ]]; then
            echo "**🎉 Overall Result: ✅ All checks passed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**⚠️ Overall Result: ❌ Some checks failed. Please review the detailed results above.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failed Components:" >> $GITHUB_STEP_SUMMARY
            
            if [[ "$TF_BASE_PASSED" != "true" ]]; then
              echo "- Terraform Base (Format & Docs)" >> $GITHUB_STEP_SUMMARY
            fi
            if [[ "$TF_SECURITY_PASSED" != "true" ]]; then
              echo "- Security Checks" >> $GITHUB_STEP_SUMMARY
            fi
            if [[ "${{ inputs.terratest_run_tests }}" == "true" && "$TF_TESTS_PASSED" != "true" ]]; then
              echo "- Terraform Tests" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Check Overall Status
        if: always()
        run: |
          TF_BASE_PASSED="${{ needs.terraform_base.outputs.all_checks_passed == 'true' }}"
          TF_SECURITY_PASSED="${{ needs.terraform_security.outputs.all_checks_passed == 'true' }}"
          TF_TESTS_PASSED="${{ inputs.terratest_run_tests != true || needs.terraform_module_test.outputs.all_checks_passed == 'true' }}"
          
          if [[ "$TF_BASE_PASSED" != "true" ]] || \
             [[ "$TF_SECURITY_PASSED" != "true" ]] || \
             [[ "$TF_TESTS_PASSED" != "true" ]]; then
            echo "::error::Some checks failed. See summary above for details."
            exit 1
          fi
