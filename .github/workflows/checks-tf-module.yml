# for backwards compatibility with existing callers of checks-tf-module.yml, which is referenced in many repos. New workflows should call checks-hcl-module.yml directly with hcl_engine=terraform instead of this shim.
---
name: Terraform Module Checks
on:
  workflow_call:
    inputs:
      concurrency_group:
        description: Name of concurrency group to manage concurrent github action runs
        default: ${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        required: false
        type: string
      runner_type:
        description: Type of runner (GitHub-hosted or self-hosted)
        required: false
        default: ubuntu-latest
        type: string
      commit_user:
        description: Username which should be used for commits by github action
        default: github-actions
        required: false
        type: string
      commit_email:
        description: Email which should be used for commits by github action
        default: noreply@github.com
        required: false
        type: string

      # GitHub Workflow Config Repo
      gh_wf_config_repo:
        description: Public repo where GitHub workflow config is stored
        default: acai-solutions/github-workflow-configs
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: Ref or branch of gh_wf_config_repo
        default: main
        required: false
        type: string

      # Linting inputs


      # Terraform inputs
      tf_version:
        description: Terraform version used for formatting and docs
        default: latest
        required: false
        type: string
      tf_docs_skip:
        description: "Skip Terraform docs generation"
        required: false
        default: false
        type: boolean
      tf_lint_include:
        description: Whether to include TFLint code quality checks
        required: false
        default: true
        type: boolean
      tf_lint_config_path:
        description: Path to tflint config in gh_wf_config_repo (e.g. "aws/.tflint.hcl")
        default: .tflint.hcl
        required: false
        type: string
      tf_lint_version:
        description: Tflint version to use
        default: latest
        required: false
        type: string
      tf_lint_allow_failures:
        description: Whether to allow TFLint failures to pass the pipeline
        required: false
        default: false
        type: boolean
      tf_trivy_version:
        description: Trivy version to use
        default: latest
        required: false
        type: string
      tf_checkov_failures_allow:
        description: Whether to abort the workflow if Checkov checks fail
        required: false
        default: false
        type: boolean

      # Test inputs
      tf_terratest_run_tests:
        description: Whether to run Terraform (Terratest) tests
        required: false
        default: true
        type: boolean
      tf_test_beds:
        description: "List of test beds to run tests against (JSON array, e.g. [\"AWS\"])"
        required: false
        default: '["AWS"]'
        type: string
      tf_test_bed_aws_terratest_config:
        description: 'Path to AWS terratest matrix json config'
        default: "aws/matrix_tf1x5x7_aws5x80x0.json"
        required: false
        type: string
      tf_test_bed_aws_esc_terratest_config:
        description: 'Path to AWS-ESC terratest matrix json config'
        default: "aws/matrix_tf1x14x0_aws6x29x0.json"
        required: false
        type: string
      tf_terratest_path:
        description: "Path to terratest directory"
        default: "_test/terratest"
        required: false
        type: string
      tf_terratest_examples_path:
        description: "Path to terratest examples directory"
        default: "_example"
        required: false
        type: string

      # ── AI Autofix (optional) ───────────────────────────────────────────
      tf_ai_autofix_include:
        description: "Whether to run Terraform AI autofix on _cop branch when checks fail"
        required: false
        default: false
        type: boolean
      tf_ai_autofix_tflint:
        description: "Whether to fix TFLint findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_trivy:
        description: "Whether to fix Trivy findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_checkov:
        description: "Whether to fix Checkov findings (Terraform)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_tests:
        description: "Whether to fix Terratest failures (Go test + Terraform examples)"
        required: false
        default: true
        type: boolean
      tf_ai_autofix_max_attempts:
        description: "Maximum number of Terraform autofix iterations on _cop branch"
        required: false
        default: 3
        type: number

    outputs:
      all_checks_passed:
        description: Indicates if all pipeline steps passed successfully
        value: ${{ jobs.hcl_checks.outputs.all_checks_passed }}
      terraform_base_status:
        description: Terraform base pipeline status
        value: ${{ jobs.hcl_checks.outputs.hcl_base_status }}
      security_status:
        description: Security checks status
        value: ${{ jobs.hcl_checks.outputs.security_status }}
      autofix_applied:
        description: Whether terraform-ai-autofix was applied
        value: ${{ jobs.hcl_checks.outputs.autofix_applied }}
      ai_branch:
        description: Name of the _cop branch used for fixes
        value: ${{ jobs.hcl_checks.outputs.ai_branch }}

jobs:
  # ╔═══════════════════════════════════════════════════════════════════════╗
  # ║  DEPRECATED — backwards-compatibility shim                           ║
  # ║  Delegates to checks-hcl-module.yml with hcl_engine=terraform.       ║
  # ║  New callers should use checks-hcl-module.yml directly.              ║
  # ╚═══════════════════════════════════════════════════════════════════════╝
  hcl_checks:
    uses: ./.github/workflows/checks-hcl-module.yml
    with:
      concurrency_group: ${{ inputs.concurrency_group }}
      runner_type: ${{ inputs.runner_type }}
      commit_user: ${{ inputs.commit_user }}
      commit_email: ${{ inputs.commit_email }}
      gh_wf_config_repo: ${{ inputs.gh_wf_config_repo }}
      gh_wf_config_repo_ref: ${{ inputs.gh_wf_config_repo_ref }}
      hcl_engine: terraform
      hcl_engine_version: ${{ inputs.tf_version }}
      hcl_docs_skip: ${{ inputs.tf_docs_skip }}
      hcl_lint_include: ${{ inputs.tf_lint_include }}
      hcl_lint_config_path: ${{ inputs.tf_lint_config_path }}
      hcl_lint_version: ${{ inputs.tf_lint_version }}
      hcl_lint_allow_failures: ${{ inputs.tf_lint_allow_failures }}
      hcl_trivy_version: ${{ inputs.tf_trivy_version }}
      hcl_checkov_failures_allow: ${{ inputs.tf_checkov_failures_allow }}
      hcl_terratest_run_tests: ${{ inputs.tf_terratest_run_tests }}
      hcl_test_beds: ${{ inputs.tf_test_beds }}
      hcl_test_bed_aws_terratest_configs: ${{ format('["{0}"]', inputs.tf_test_bed_aws_terratest_config) }}
      hcl_test_bed_aws_esc_terratest_configs: ${{ format('["{0}"]', inputs.tf_test_bed_aws_esc_terratest_config) }}
      hcl_terratest_path: ${{ inputs.tf_terratest_path }}
      hcl_terratest_examples_path: ${{ inputs.tf_terratest_examples_path }}
      hcl_ai_autofix_include: ${{ inputs.tf_ai_autofix_include }}
      hcl_ai_autofix_tflint: ${{ inputs.tf_ai_autofix_tflint }}
      hcl_ai_autofix_trivy: ${{ inputs.tf_ai_autofix_trivy }}
      hcl_ai_autofix_checkov: ${{ inputs.tf_ai_autofix_checkov }}
      hcl_ai_autofix_tests: ${{ inputs.tf_ai_autofix_tests }}
      hcl_ai_autofix_max_attempts: ${{ inputs.tf_ai_autofix_max_attempts }}
    secrets: inherit
