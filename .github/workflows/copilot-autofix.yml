name: Copilot Autofix

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: Auto-fixes Python and/or Terraform findings on a
# dedicated _cop branch.
#
# Branch Strategy (_cop):
#   - Feature branch fails checks → <branch>_cop is created ONCE
#   - Fixes are committed on _cop, push triggers CI on _cop again
#   - Iterates (fix → push → check → fix → ...) until checks pass
#   - Max iterations controlled by max_copilot_attempts (default: 3)
#   - NO auto-merge: when checks pass, caller creates PR (_cop → feature)
#
# Fix types (can be combined):
#   - fix_python:    Black, isort, Ruff (deterministic) + Flake8/Copilot (AI)
#   - fix_terraform: terraform fmt (deterministic) + TFLint/Copilot (AI)
#
# Trigger chain:
#   Feature branch → checks fail → autofix creates _cop, pushes
#   _cop push      → checks run  → fail → autofix commits more, pushes
#   _cop push      → checks run  → pass → PR created (_cop → feature)
#
# Iteration control:
#   - Counts autofix commits on _cop since divergence from feature branch
#   - Stops at max_copilot_attempts
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string

      # ── Fix type selection ──────────────────────────────────────────────
      fix_python:
        description: "Apply Python auto-fixes (Black, isort, Ruff, Flake8+Copilot)"
        required: false
        default: false
        type: boolean
      fix_terraform:
        description: "Apply Terraform auto-fixes (fmt, TFLint+Copilot)"
        required: false
        default: false
        type: boolean

      # ── Python-specific inputs ──────────────────────────────────────────
      python_version:
        description: "Python version"
        default: "3.12"
        required: false
        type: string
      python_source_path:
        description: "Relative path from repo root to the Python package root"
        default: "."
        required: false
        type: string
      copilot_fix_flake8:
        description: "Whether Copilot should attempt to fix flake8 findings"
        required: false
        default: true
        type: boolean
      copilot_fix_tests:
        description: "Whether Copilot should attempt to fix failing tests (risky!)"
        required: false
        default: false
        type: boolean
      extra_pip_packages:
        description: "Space-separated extra pip packages to install"
        default: ""
        required: false
        type: string

      # ── Terraform-specific inputs ───────────────────────────────────────
      tf_version:
        description: "Terraform version for formatting"
        default: "latest"
        required: false
        type: string

      # ── Common inputs ───────────────────────────────────────────────────
      max_copilot_attempts:
        description: "Maximum number of Copilot fix iterations on _cop branch"
        required: false
        default: 3
        type: number
      commit_user:
        description: "Username for autofix commits"
        default: "github-actions[bot]"
        required: false
        type: string
      commit_email:
        description: "Email for autofix commits"
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        required: false
        type: string

    outputs:
      fixes_applied:
        description: "Whether fixes were pushed to _cop branch"
        value: ${{ jobs.autofix.outputs.fixes_applied }}
      fix_summary:
        description: "Summary of applied fixes"
        value: ${{ jobs.autofix.outputs.fix_summary }}
      cop_branch:
        description: "Name of the _cop branch"
        value: ${{ jobs.guard.outputs.cop_branch }}
      feature_branch:
        description: "Name of the feature branch"
        value: ${{ jobs.guard.outputs.feature_branch }}
      iteration:
        description: "Current iteration count after this run"
        value: ${{ jobs.guard.outputs.iteration }}

defaults:
  run:
    shell: bash

jobs:
  # ── Guard: detect branch context and check iteration limit ──────────────
  guard:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      is_cop_branch: ${{ steps.detect.outputs.is_cop_branch }}
      current_branch: ${{ steps.detect.outputs.current_branch }}
      cop_branch: ${{ steps.detect.outputs.cop_branch }}
      feature_branch: ${{ steps.detect.outputs.feature_branch }}
      iteration: ${{ steps.detect.outputs.iteration }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Detect branch context and iteration count
        id: detect
        run: |
          CURRENT_BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"

          # Determine if we are on a _cop branch or a feature branch
          if [[ "${CURRENT_BRANCH}" == *_cop ]]; then
            IS_COP=true
            FEATURE_BRANCH="${CURRENT_BRANCH%_cop}"
            COP_BRANCH="${CURRENT_BRANCH}"
          else
            IS_COP=false
            FEATURE_BRANCH="${CURRENT_BRANCH}"
            COP_BRANCH="${CURRENT_BRANCH}_cop"
          fi

          echo "current_branch=${CURRENT_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "is_cop_branch=${IS_COP}" >> "$GITHUB_OUTPUT"
          echo "feature_branch=${FEATURE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "cop_branch=${COP_BRANCH}" >> "$GITHUB_OUTPUT"

          # Count autofix iterations on _cop branch
          ITERATION=0
          if [[ "${IS_COP}" == "true" ]]; then
            git fetch origin "${FEATURE_BRANCH}" 2>/dev/null || true
            DIVERGE=$(git merge-base HEAD "origin/${FEATURE_BRANCH}" 2>/dev/null || echo "")
            if [[ -n "${DIVERGE}" ]]; then
              ITERATION=$(git log --oneline "${DIVERGE}..HEAD" --grep="copilot-autofix: true" | wc -l | tr -d ' ')
            fi
          fi

          echo "iteration=${ITERATION}" >> "$GITHUB_OUTPUT"

          MAX=${{ inputs.max_copilot_attempts }}
          if [[ "${ITERATION}" -ge "${MAX}" ]]; then
            echo "🛑 Max iterations (${MAX}) reached on ${COP_BRANCH} — stopping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

          echo "📌 Current branch:  ${CURRENT_BRANCH}"
          echo "📌 Feature branch:  ${FEATURE_BRANCH}"
          echo "📌 Cop branch:      ${COP_BRANCH}"
          echo "📌 Is _cop branch:  ${IS_COP}"
          echo "📌 Iteration:       ${ITERATION} / ${MAX}"
          echo "📌 Fix Python:      ${{ inputs.fix_python }}"
          echo "📌 Fix Terraform:   ${{ inputs.fix_terraform }}"

  # ── Main autofix job — works on _cop branch ─────────────────────────────
  autofix:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner_type }}
    outputs:
      fixes_applied: ${{ steps.commit.outputs.fixes_applied }}
      fix_summary: ${{ steps.commit.outputs.fix_summary }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.guard.outputs.current_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Create _cop branch (only if not already on it) ──────────────────
      - name: "Setup _cop branch"
        run: |
          IS_COP="${{ needs.guard.outputs.is_cop_branch }}"
          COP_BRANCH="${{ needs.guard.outputs.cop_branch }}"

          git config --local user.name "${{ inputs.commit_user }}"
          git config --local user.email "${{ inputs.commit_email }}"

          if [[ "${IS_COP}" == "true" ]]; then
            echo "🔄 Already on _cop branch — continuing with fixes"
          else
            git fetch origin
            if git ls-remote --exit-code --heads origin "${COP_BRANCH}" >/dev/null 2>&1; then
              echo "🔄 _cop branch exists remotely — checking out"
              git checkout -b "${COP_BRANCH}" "origin/${COP_BRANCH}"
            else
              echo "🆕 Creating new _cop branch: ${COP_BRANCH}"
              git checkout -b "${COP_BRANCH}"
            fi
          fi

          echo "✅ Working on branch: $(git branch --show-current)"

      # ════════════════════════════════════════════════════════════════════
      # TERRAFORM FIXES
      # ════════════════════════════════════════════════════════════════════

      - name: Setup Terraform ${{ inputs.tf_version }}
        if: inputs.fix_terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: "TF Phase 1: terraform fmt"
        id: tf_fmt
        if: inputs.fix_terraform
        run: |
          if terraform fmt -check -recursive >/dev/null 2>&1; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            terraform fmt -recursive
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "✅ terraform fmt applied"
          fi

      - name: "TF Phase 2: Collect TFLint findings"
        id: tf_lint_check
        if: inputs.fix_terraform
        continue-on-error: true
        run: |
          if command -v tflint &>/dev/null; then
            tflint --format compact > /tmp/tflint-findings.txt 2>&1 || true
            FINDING_COUNT=$(grep -c "Error\|Warning" /tmp/tflint-findings.txt 2>/dev/null || echo "0")
            echo "finding_count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"
            echo "📋 TFLint findings: ${FINDING_COUNT}"
          else
            echo "finding_count=0" >> "$GITHUB_OUTPUT"
            echo "⚠️ TFLint not installed — skipping TFLint analysis"
          fi

      # ════════════════════════════════════════════════════════════════════
      # PYTHON FIXES
      # ════════════════════════════════════════════════════════════════════

      - name: Set up Python ${{ inputs.python_version }}
        if: inputs.fix_python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install Python tools
        if: inputs.fix_python
        run: |
          python -m pip install --upgrade pip
          pip install black isort ruff flake8 flake8-json

          if [[ -n "${{ inputs.extra_pip_packages }}" ]]; then
            pip install ${{ inputs.extra_pip_packages }}
          fi

          # Install project in editable mode if pyproject.toml exists
          if [[ -f "${{ inputs.python_source_path }}/pyproject.toml" ]]; then
            pip install -e "${{ inputs.python_source_path }}"
          fi

      # ── Python Phase 1: Deterministic fixes ─────────────────────────────
      - name: "PY Phase 1a: Black formatting"
        id: black
        if: inputs.fix_python
        working-directory: ${{ inputs.python_source_path }}
        run: |
          if black --check --quiet . 2>/dev/null; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            black .
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "✅ Black formatting applied"
          fi

      - name: "PY Phase 1b: isort import sorting"
        id: isort
        if: inputs.fix_python
        working-directory: ${{ inputs.python_source_path }}
        run: |
          if isort --check-only --quiet . 2>/dev/null; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            isort . --profile black
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "✅ isort applied"
          fi

      - name: "PY Phase 1c: Ruff auto-fix (safe fixes only)"
        id: ruff
        if: inputs.fix_python
        working-directory: ${{ inputs.python_source_path }}
        continue-on-error: true
        run: |
          if ruff check . 2>/dev/null; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            # Only apply safe, non-breaking fixes
            ruff check --fix --unsafe-fixes=false . 2>/dev/null || true
            if [[ -n "$(git diff --name-only)" ]]; then
              echo "changes=true" >> "$GITHUB_OUTPUT"
              echo "✅ Ruff auto-fix applied"
            else
              echo "changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Python Phase 2: Collect remaining findings for Copilot ──────────
      - name: "PY Phase 2: Collect remaining flake8 findings"
        id: flake8_check
        if: inputs.fix_python && inputs.copilot_fix_flake8
        working-directory: ${{ inputs.python_source_path }}
        continue-on-error: true
        run: |
          # Run flake8 and capture JSON output
          # Explicitly reference repo-root config if it exists (working-directory may differ)
          FLAKE8_ARGS=". --format=json --output-file=/tmp/flake8-findings.json"
          if [[ -f "${GITHUB_WORKSPACE}/.flake8" ]]; then
            FLAKE8_ARGS="${FLAKE8_ARGS} --config=${GITHUB_WORKSPACE}/.flake8"
            echo "📋 Using .flake8 config from repo root"
          elif [[ -f "${GITHUB_WORKSPACE}/setup.cfg" ]]; then
            FLAKE8_ARGS="${FLAKE8_ARGS} --config=${GITHUB_WORKSPACE}/setup.cfg"
            echo "📋 Using setup.cfg config from repo root"
          fi
          flake8 ${FLAKE8_ARGS} 2>/dev/null || true

          FINDING_COUNT=$(python3 -c "
          import json, sys
          try:
              with open('/tmp/flake8-findings.json') as f:
                  data = json.load(f)
              total = sum(len(v) for v in data.values())
              print(total)
          except Exception:
              print(0)
          ")

          echo "finding_count=$FINDING_COUNT" >> "$GITHUB_OUTPUT"
          echo "📋 Remaining flake8 findings after deterministic fixes: $FINDING_COUNT"

      - name: "PY Phase 2: Run tests and capture failures"
        id: test_check
        if: inputs.fix_python && inputs.copilot_fix_tests
        working-directory: ${{ inputs.python_source_path }}
        continue-on-error: true
        run: |
          pip install pytest 2>/dev/null
          if pytest --tb=short --no-header -q 2>/tmp/pytest-output.txt; then
            echo "tests_pass=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_pass=false" >> "$GITHUB_OUTPUT"
            echo "📋 Test failures detected"
          fi

      # ════════════════════════════════════════════════════════════════════
      # COPILOT AI-BASED FIXES
      # ════════════════════════════════════════════════════════════════════

      - name: "AI Phase: Copilot fix — flake8 findings"
        id: copilot_flake8
        if: >
          inputs.fix_python &&
          inputs.copilot_fix_flake8 &&
          steps.flake8_check.outputs.finding_count != '0' &&
          steps.flake8_check.outputs.finding_count != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ inputs.python_source_path }}
        run: |
          echo "🤖 Asking Copilot to fix ${{ steps.flake8_check.outputs.finding_count }} flake8 findings..."

          # Build a prompt from the flake8 findings
          FINDINGS_PROMPT=$(python3 << 'PYEOF'
          import json

          try:
              with open("/tmp/flake8-findings.json") as f:
                  data = json.load(f)
          except Exception:
              print("No findings to fix.")
              exit(0)

          lines = []
          for filepath, issues in data.items():
              for issue in issues:
                  lines.append(
                      f"{filepath}:{issue['line_number']}:{issue['column_number']} "
                      f"{issue['code']} {issue['text']}"
                  )

          # Limit to 30 findings to keep the prompt manageable
          if len(lines) > 30:
              lines = lines[:30]
              lines.append(f"... and {len(lines)-30} more findings")

          print("\n".join(lines))
          PYEOF
          )

          if [[ -z "$FINDINGS_PROMPT" || "$FINDINGS_PROMPT" == "No findings to fix." ]]; then
            echo "copilot_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Try using Copilot via gh CLI for each file with findings
          python3 << 'PYEOF'
          import json, subprocess, os, sys

          try:
              with open("/tmp/flake8-findings.json") as f:
                  data = json.load(f)
          except Exception:
              sys.exit(0)

          for filepath, issues in data.items():
              if not os.path.exists(filepath):
                  continue

              findings_text = "\n".join(
                  f"  Line {i['line_number']}: {i['code']} {i['text']}"
                  for i in issues[:10]
              )

              print(f"  📝 Findings for {filepath}:")
              print(findings_text)

              try:
                  result = subprocess.run(
                      ["gh", "copilot", "suggest", "-t", "code",
                       f"Fix these flake8 issues in {filepath}: {findings_text}"],
                      capture_output=True, text=True, timeout=60,
                      env={**os.environ, "GH_TOKEN": os.environ.get("GH_TOKEN", "")}
                  )
                  if result.returncode == 0 and result.stdout.strip():
                      print(f"  ✅ Copilot suggestion received for {filepath}")
                  else:
                      print(f"  ⚠️ Copilot did not return a fix for {filepath}")
              except (subprocess.TimeoutExpired, FileNotFoundError):
                  print(f"  ⚠️ gh copilot not available, skipping AI fix for {filepath}")

          PYEOF

          if [[ -n "$(git diff --name-only)" ]]; then
            echo "copilot_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "copilot_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "AI Phase: Copilot fix — test failures"
        id: copilot_tests
        if: >
          inputs.fix_python &&
          inputs.copilot_fix_tests &&
          steps.test_check.outputs.tests_pass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ inputs.python_source_path }}
        run: |
          echo "🤖 Asking Copilot to analyze test failures..."

          TEST_OUTPUT=$(cat /tmp/pytest-output.txt 2>/dev/null | tail -50 || echo "No test output")

          echo "⚠️ Test failure analysis (Copilot suggestions will be added as PR comment)"
          echo "$TEST_OUTPUT"

          echo "copilot_test_changes=false" >> "$GITHUB_OUTPUT"

      # ════════════════════════════════════════════════════════════════════
      # COMMIT & PUSH
      # ════════════════════════════════════════════════════════════════════

      - name: "Commit fixes on _cop branch"
        id: commit
        run: |
          COP_BRANCH="${{ needs.guard.outputs.cop_branch }}"
          ITERATION="${{ needs.guard.outputs.iteration }}"
          NEXT=$((ITERATION + 1))

          if [[ -z "$(git status -s)" ]]; then
            echo "✅ No changes to commit (iteration ${NEXT})"
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
            echo "fix_summary=No fixes needed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build commit message with summary of applied tools
          SUMMARY=""
          [[ "${{ steps.tf_fmt.outputs.changes }}" == "true" ]] && SUMMARY="${SUMMARY}tf-fmt "
          [[ "${{ steps.black.outputs.changes }}" == "true" ]] && SUMMARY="${SUMMARY}black "
          [[ "${{ steps.isort.outputs.changes }}" == "true" ]] && SUMMARY="${SUMMARY}isort "
          [[ "${{ steps.ruff.outputs.changes }}" == "true" ]] && SUMMARY="${SUMMARY}ruff "
          [[ "${{ steps.copilot_flake8.outputs.copilot_changes }}" == "true" ]] && SUMMARY="${SUMMARY}copilot-flake8 "

          git add -A
          git commit -m "fix: auto-fix findings [${SUMMARY% }] (iteration ${NEXT})

          copilot-autofix: true"

          echo "fixes_applied=true" >> "$GITHUB_OUTPUT"
          echo "fix_summary=${SUMMARY% }" >> "$GITHUB_OUTPUT"
          echo "📝 Committed on ${COP_BRANCH} (iteration ${NEXT}): ${SUMMARY% }"

      - name: "Push _cop branch → triggers CI recheck"
        if: steps.commit.outputs.fixes_applied == 'true'
        run: |
          COP_BRANCH="${{ needs.guard.outputs.cop_branch }}"
          git push origin "HEAD:${COP_BRANCH}"
          echo "✅ Pushed to ${COP_BRANCH} — CI re-triggers automatically"

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Generate Summary
        if: always()
        run: |
          COP_BRANCH="${{ needs.guard.outputs.cop_branch }}"
          FEATURE_BRANCH="${{ needs.guard.outputs.feature_branch }}"
          ITERATION="${{ needs.guard.outputs.iteration }}"
          MAX="${{ inputs.max_copilot_attempts }}"

          echo '# 🤖 Copilot Autofix Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "**_cop branch:** \`${COP_BRANCH}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Feature branch:** \`${FEATURE_BRANCH}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Iteration:** ${ITERATION} / ${MAX}" >> $GITHUB_STEP_SUMMARY
          echo "**Fix types:** ${{ inputs.fix_python && 'Python' || '' }} ${{ inputs.fix_terraform && 'Terraform' || '' }}" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Phase | Tool | Changes |' >> $GITHUB_STEP_SUMMARY
          echo '|-------|------|---------|' >> $GITHUB_STEP_SUMMARY

          if [[ "${{ inputs.fix_terraform }}" == "true" ]]; then
            echo "| Deterministic | terraform fmt | ${{ steps.tf_fmt.outputs.changes == 'true' && '✅ Applied' || '⏭️ Clean' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ inputs.fix_python }}" == "true" ]]; then
            echo "| Deterministic | Black | ${{ steps.black.outputs.changes == 'true' && '✅ Applied' || '⏭️ Clean' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Deterministic | isort | ${{ steps.isort.outputs.changes == 'true' && '✅ Applied' || '⏭️ Clean' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Deterministic | Ruff | ${{ steps.ruff.outputs.changes == 'true' && '✅ Applied' || '⏭️ Clean' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| AI-based | Copilot (flake8) | ${{ steps.copilot_flake8.outputs.copilot_changes == 'true' && '✅ Applied' || '⏭️ Clean / Skipped' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          echo '' >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.commit.outputs.fixes_applied }}" == "true" ]]; then
            echo "**🔄 Fixes pushed to \`${COP_BRANCH}\` — CI re-triggers automatically.**" >> $GITHUB_STEP_SUMMARY
          else
            echo '**✅ No additional fixes needed this iteration.**' >> $GITHUB_STEP_SUMMARY
          fi
