name: Copilot Autofix

on:
  workflow_call:
    inputs:
      runner_type:
        description: "Type of runner (GitHub-hosted or self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      fix_python:
        description: "Whether to run Python auto-formatting (black + isort)"
        required: false
        default: true
        type: boolean
      python_version:
        description: "Python version"
        default: "3.11"
        required: false
        type: string
      python_source_path:
        description: "Relative path from repo root to the Python package root (where pyproject.toml lives)"
        default: "shared/python"
        required: false
        type: string
      copilot_fix_flake8:
        description: "Whether to attempt auto-fixing flake8 findings (unused imports via autoflake)"
        required: false
        default: true
        type: boolean
      copilot_fix_bandit:
        description: "Whether Copilot should attempt to fix bandit findings"
        required: false
        default: true
        type: boolean
      copilot_fix_tests:
        description: "Whether Copilot should attempt to fix failing tests"
        required: false
        default: false
        type: boolean
      test_modules:
        description: >
          JSON array of module names whose _test/ folders should be exercised.
          Example: '["logging","storage","xml_parser"]'
        default: "[]"
        required: false
        type: string
      extra_pip_packages:
        description: "Space-separated pip packages to install for tests"
        default: ""
        required: false
        type: string
      commit_user:
        description: "Username which should be used for commits by github action"
        default: "github-actions"
        required: false
        type: string
      commit_email:
        description: "Email which should be used for commits by github action"
        default: "noreply@github.com"
        required: false
        type: string
      gh_wf_config_repo:
        description: "Public repo where Python linting config is stored"
        default: "acai-solutions/github-workflow-configs"
        required: false
        type: string
      gh_wf_config_repo_ref:
        description: "Ref or branch of gh_wf_config_repo"
        default: "main"
        required: false
        type: string
      python_config_path:
        description: 'Path to python config in gh_wf_config_repo (e.g. "python")'
        default: "python"
        required: false
        type: string

    outputs:
      fixes_applied:
        description: "true when at least one fix was committed to the _cop branch"
        value: ${{ jobs.autofix.outputs.fixes_applied }}
      cop_branch:
        description: "Name of the _cop branch created for fixes"
        value: ${{ jobs.autofix.outputs.cop_branch }}

defaults:
  run:
    shell: bash

jobs:
  autofix:
    runs-on: ${{ inputs.runner_type }}
    outputs:
      fixes_applied: ${{ steps.commit.outputs.fixes_applied }}
      cop_branch: ${{ steps.create_branch.outputs.cop_branch }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Determine _cop branch name
        id: create_branch
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"
          # Strip existing _cop suffix to avoid double-appending
          BASE_BRANCH="${SOURCE_BRANCH%_cop}"
          COP_BRANCH="${BASE_BRANCH}_cop"
          echo "cop_branch=${COP_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "source_branch=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"

          git config --local user.name "${{ inputs.commit_user }}"
          git config --local user.email "${{ inputs.commit_email }}"

          # Create or reset the _cop branch from the current source
          if git ls-remote --exit-code --heads origin "${COP_BRANCH}" > /dev/null 2>&1; then
            echo "Branch ${COP_BRANCH} already exists — resetting to ${SOURCE_BRANCH}"
            git checkout -B "${COP_BRANCH}"
          else
            echo "Creating new branch ${COP_BRANCH}"
            git checkout -b "${COP_BRANCH}"
          fi

      - name: Set up Python
        if: ${{ inputs.fix_python || inputs.copilot_fix_flake8 || inputs.copilot_fix_tests }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install fix tools
        if: ${{ inputs.fix_python || inputs.copilot_fix_flake8 }}
        run: |
          pip install black isort autoflake

      - name: Apply Black formatting
        if: ${{ inputs.fix_python }}
        run: |
          echo "Running Black auto-format..."
          black .
          echo "✅ Black formatting applied"

      - name: Apply isort
        if: ${{ inputs.fix_python }}
        run: |
          echo "Running isort..."
          isort . --profile black
          echo "✅ Import sorting applied"

      - name: Fetch Flake8 config
        id: get_flake8_config
        if: ${{ inputs.copilot_fix_flake8 }}
        run: |
          if [[ -f ".flake8" ]]; then
            echo "Using local .flake8"
            echo "config_source=local" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/${{ inputs.gh_wf_config_repo }}/contents/${{ inputs.python_config_path }}/.flake8?ref=${{ inputs.gh_wf_config_repo_ref }}")

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)
          CONTENT=$(echo "$HTTP_RESPONSE" | head -n -1)

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "$CONTENT" > .flake8
            echo "config_source=remote" >> "$GITHUB_OUTPUT"
          else
            echo "config_source=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix unused imports and trailing whitespace (autoflake)
        if: ${{ inputs.copilot_fix_flake8 }}
        run: |
          echo "Running autoflake to remove unused imports and variables..."
          autoflake \
            --in-place \
            --recursive \
            --remove-unused-variables \
            --remove-all-unused-imports \
            .
          echo "✅ autoflake fixes applied"

      - name: Install package and test dependencies
        if: ${{ inputs.copilot_fix_tests && inputs.test_modules != '[]' }}
        working-directory: ${{ inputs.python_source_path }}
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .
          if [[ -n "${{ inputs.extra_pip_packages }}" ]]; then
            pip install ${{ inputs.extra_pip_packages }}
          fi

      - name: Run tests (diagnostic — fixes not auto-applied)
        if: ${{ inputs.copilot_fix_tests && inputs.test_modules != '[]' }}
        working-directory: ${{ inputs.python_source_path }}
        continue-on-error: true
        run: |
          echo "⚠️ copilot_fix_tests=true: running tests to surface failures."
          echo "Automated test rewriting is not supported; results are for review only."
          PKG=$(python -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml','rb') as f:
              cfg = tomllib.load(f)
          print(cfg['project']['name'])
          ")
          for MODULE in $(echo '${{ inputs.test_modules }}' | python3 -c "import sys,json; [print(m) for m in json.load(sys.stdin)]"); do
            echo "--- pytest: ${MODULE} ---"
            pytest "${PKG}/${MODULE}/_test/" -v --tb=short || true
          done

      - name: Commit fixes to _cop branch
        id: commit
        run: |
          git config --local user.name "${{ inputs.commit_user }}"
          git config --local user.email "${{ inputs.commit_email }}"

          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit — no fixes were needed"
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "fix(autofix): apply automated Python code fixes (black, isort, autoflake)"
            echo "fixes_applied=true" >> "$GITHUB_OUTPUT"
            echo "✅ Fixes committed to ${{ steps.create_branch.outputs.cop_branch }}"
          fi

      - name: Push _cop branch
        uses: ad-m/github-push-action@v1.0.0
        with:
          github_token: ${{ github.token }}
          branch: ${{ steps.create_branch.outputs.cop_branch }}
          force: true

      - name: Summary
        if: always()
        run: |
          echo '# 🤖 Copilot Autofix' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "| Input | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| fix_python | ${{ inputs.fix_python }} |" >> $GITHUB_STEP_SUMMARY
          echo "| copilot_fix_flake8 | ${{ inputs.copilot_fix_flake8 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| copilot_fix_bandit | ${{ inputs.copilot_fix_bandit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| copilot_fix_tests | ${{ inputs.copilot_fix_tests }} |" >> $GITHUB_STEP_SUMMARY
          echo "| _cop branch | ${{ steps.create_branch.outputs.cop_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| fixes_applied | ${{ steps.commit.outputs.fixes_applied }} |" >> $GITHUB_STEP_SUMMARY
